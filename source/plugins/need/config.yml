#功能:
#>付款功能
#>随机传送功能
#>出售物品
#>商店修正
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/need/language_cn.yml"
#################################
#####         权限          #####
#################################
#管理权限
per_need_admin: "per.need.admin"
#使用/pay命令的权限
per_need_pay: "per.need.pay"
#随机传送的权限
per_need_tpr: "per.need.tpr"
#随机传送无延迟的权限
per_need_noDelay: "per.need.noDelay"
#随机传送无花费权限
per_need_noCostTpr: "per.need.noCostTpr"
#使用出售命令的权限
per_need_sell: "per.need.sell"
#随机传送VIP权限(随机传送冷却时间更短)
per_need_tpr_vip: "per.need.tpr.vip"
#转帐VIP权限(转账免税)
per_need_vip: "per.need.vip"
#################################
#####        命令石         #####
#################################
stone:
  flag:                          #命令石检测的标记
    server: "&5+命令石+&a控制台"
    player: "&5+命令石+&a玩家"
  tip: "&5命令:&b "              #命令检测的标记
  forever: "&5+永久性+"          #不会使用减少的标记
#################################
#####         付款          #####
#################################
pay:
  base: 5                        #固定手续费
  rate: 100                      #比例手续费,0-10000
#################################
#####       随机传送        #####
#################################
#需要WorldBorder插件,否则无效!
#随机传送间隔,单位毫秒
interval: 30000
#VIP随机传送间隔,单位毫秒
vipInterval: 10000
#传送延迟,单位毫秒
delay: 3000
#允许随机传送的世界列表
tprWorlds:
  - "world"
  - "newWorld"
  - "oreWorld"
#检测最大次数(防传送到海里)
times: 8
#花费
costs:
  tprCost:                       #增加花费
    money: 0
    exp: 0
    level: 0
    item:
#################################
#####        物品类型       #####
#################################
items:
  tprCostItem:
    type: DIAMOND
    amount: 1
#################################
#####        出售物品       #####
#################################
enableSell: true
info:
  - "3 0.3"                      #泥土
  - "4 0.7"                      #圆石
  - "12 0.3"                     #沙子
  - "13 0.4"                     #沙砾
  - "388 50"                     #绿宝石
  - "18 0.1"                     #树叶
  - "24 0.6"                     #沙石
  - "35 0.4"                     #羊毛
  - "49 7"                       #黑耀石
  - "66 5"                       #铁轨
  - "81 1"                       #仙人掌
  - "86 1.1"                     #南瓜
  - "87 0.35"                    #地狱岩
  - "88 1"                       #灵魂沙
  - "112 0.8"                    #地狱砖块
  - "121 1"                      #末地石
  - "263 2.2"                    #煤炭
  - "264 230"                    #钻石
  - "265 20"                     #铁锭
  - "266 40"                     #金锭
  - "296 1"                      #小麦
  - "318 1"                      #燧石
  - "319 4"                      #生猪排
  - "329 5"                      #鞍
  - "331 1.1"                    #红石
  - "334 3"                      #皮革
  - "337 1.5"                    #粘土
  - "338 0.1"                    #甘蔗
  - "341 5"                      #粘液球
  - "344 0.6"                    #蛋
  - "348 2.5"                    #萤石粉
  - "349 2.5"                    #生鱼
  - "360 0.08"                   #西瓜片
  - "363 4"                      #生牛肉
  - "365 2.5"                    #生鸡肉
  - "391 0.8"                    #胡萝卜
  - "392 0.8"                    #马铃薯
