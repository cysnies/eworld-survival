#功能:
#>服务器传送
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/join/language_cn.yml"
#################################
#####         权限          #####
#################################
#管理权限
per_join_admin: "per.join.admin"
#加入xxx服的权限是"per.join.server.xxx"(自动转换xxx成小写)
names:
  - "l 登录服"
  - "d 大厅服"
  - "s 生存服"
  - "x 虚空服"
  - "c 创造服"
  - "k 空岛服"