#功能:
#>跨服背包
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/pack/language_cn.yml"
#################################
#####         权限          #####
#################################
#pack管理权限
per_pack_admin: "per.pack.admin"
#打开第n背包的权限是per.pack.open.<ID>
#################################
#####          配置         #####
#################################
max: 5                           #背包数上限
speed: 1000                      #打开背包间隔,单位毫秒