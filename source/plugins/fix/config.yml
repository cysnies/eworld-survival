#功能:
#>修正
#  - 活塞无法跨领地推
#  - 商店下禁止非所有者放漏斗
#  - 药效最长时间限制防无限药效bug(有管理权限除外)
#  - 动物收费
#  - 取消作物的自然生长
#  - 取消动物生子
#  - 村民生命
#  - 禁止头被改名
#  - 取消农田被踩坏
#  - 禁止头被流水冲走
#  - 满人被踢修改提示
#  - 自动刷怪笼怪物清理
#  - 新世界领地外无法打破放置提示
#  - 防卡地狱门
#  - 羊长毛速度降低
#  - 刷怪笼生怪几率降低
#  - 定时检测没有'essentials.fly'权限的玩家取消飞行(会同时检测land的fly标记)
#  - 随身工作台
#  - 攻击效果加强(玩家伤害生物时,玩家,骷髅,火焰人,铁傀儡除外)
#  - 技能+点石成金+
#  - 技能+万金油+
#  - 技能+挖矿祝福+
#  - 技能+战争祝福+
#  - 动态火把
#  - 打怪掠夺更多经验
#  - 挖矿(熔炉)掠夺更多经验
#  - 禁止药水界面按住shift点击
#  - 玩家第一次进服时自动获得一本帮助
#  - 玩家进入或退出游戏时强制从交通工具上下来
#  - 玩家进入游戏时检测修正位置,防bug(将被传送到世界'world'的重生点)
#  - 玩家上线轻微检测传送改变位置防bug
#  - 指定世界(家园)禁止自然生怪
#  - 爆炸无法炸毁方块
#  - 禁止挂画被非玩家的实体与未知或爆炸打破
#  - 禁止玩家使用指定物品
#  - 禁止玩家接触末地传送门方块
#  - 倒水与倒岩浆权限添加
#  - 倒液体修正,在玩家无法倒液体时没收液体
#  - 倒液体花费
#  - 发射器禁发射指定物品
#  - 右键生物显示生命值
#  - 禁止村民的生子与自然生成与区块生成
#  - 取消铁人把目标设定为僵尸
#  - 防止生物消失
#  - 地狱中取消骷髅因刷怪蛋而生成
#  - 地狱中骷髅生成机率降低
#  - 生物吞噬
#  - 生物聊天
#  - 生物掉落增加
#  - 生物死亡掉落物提示
#  - 处于世界中提示
#  - 红石治疗好友
#  - 木牌文字颜色转换(/&会显示'&',其它&会被转换)
#  - 禁止命名牌使用
#>抽奖牌
#>夜晚
#  - 进入白天/黑夜提示
#  - 白天黑暗中不生怪
#  - 恐怖夜晚,夜晚在玩家身边及稍远处生怪
#>附魔降低
#>挖方块增加消耗,及使用更快(耐久消耗更快)
#>季节与成长修正
#  - 成长修正
#    - 作物成长修正
#    - 动物成长修正
#  - 季节
#    - 春夏秋冬转换及年份提示
#    - 季节作物与动物修正
#  - 新年礼包
#>刷怪笼修正
#  - 刷怪笼数量增加,种类增加
#  - 打破掉落附魔瓶
#  - 打破失败生怪
#  - 刷怪数量限制
#  - 地狱中取消凋零骷髅因刷怪笼而生成
#>钓鱼
#>彩票
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/fix/language_cn.yml"
#################################
#####         权限          #####
#################################
#管理权限
per_fix_admin: "per.fix.admin"
#立即打破刷怪笼的权限
per_fix_spawner_break: "per.fix.spawner.break"
#有此权限的玩家晚上不会在身边生怪(恐怖夜晚)
per_fix_banNight: "per.fix.banNight"
#倒水/岩浆免费的权限
per_fix_bucket_free: "per.fix.bucket.free"
#随身工作台的权限
per_fix_craft: "per.fix.craft"
#################################
#####          修正         #####
#################################
#药效最长时间,单位秒
longestEffect: 600
#动物收费
animalCost:
  enable: true
  type: "animalCost"             #实体类型
  free: "per.fix.animalCost.free"#养殖免费的权限
  interval: 600                  #检测间隔,单位秒
  chance: 20                     #收费几率,0-100
  costChance: 20                 #每次收费几率,0-100
  cost: 5                        #每次每个动物收费数量,整数
#取消作物的自然生长
cancelGrow: true
#取消动物生子,留空表示不取消
cancelBreed:
  type: "breed"                  #取消生子的实体类型
#村民生命
villageLife: 300
#自动刷怪笼怪物清理
autoMonClear:
  interval: 2                    #检测间隔,单位秒
  amount: 1                      #每次随机检测的怪物次数(每个世界)
  range: 15                      #检测范围
  max: 30                        #数量上限(同类型)
#新世界无法打破提示间隔
newWorldTipLimit: 10000
#防卡地狱门
netherDoorTip: 5                 #卡地狱门里多少秒后提示玩家
netherDoor: 30                   #卡地狱门里多少秒后发出重生事件
#羊长毛速度降低(有多少几率会成功长毛)
fixSheep: 60
#刷怪笼生怪几率降低(?/100的几率取消刷怪笼生怪)
fixSpawner: 0
#技能+点石成金+(把石头变成黄金)
stoneGold:
  per: "per.fix.stoneGold"       #需要的权限
  worlds:                        #在哪些世界中有效
    - "oreWorld"
  chance: 4000                   #几率,多少分之一
  radius: 6                      #检测的范围半径
  amount: 30                     #变成金矿的数量
  id: 14                         #金矿的ID
#技能+万金油+
statsGood:
  per: "per.fix.statsGood"       #需要的权限
  chance: 1000                   #触发概率为多少分之一
  mineType: "mine"               #有效的矿物类型
  toolType: "tool"               #有效的工具类型
#技能+挖矿祝福+(考虑耐久附魔)
mineGood:
  per: "per.fix.mineGood"        #需要的权限
  chance: 100                    #触发概率为多少分之一
  add: 30                        #触发后恢复的耐久(无耐久附魔情况下)
  mineType: "mine"               #有效的矿物类型
  toolType: "tool"               #有效的工具类型
#技能+战争祝福+(考虑耐久附魔)
attackGood:
  per: "per.fix.attackGood"      #需要的权限
  chance: 100                    #触发概率为多少分之一
  add: 25                        #触发后恢复的耐久(无耐久附魔情况下)
#动态火把(只在夜晚有效)
light:
  tipInterval: 250               #动态火把提示间隔
  effect:                        #对玩家在哪些方块上时有效
    - 1
    - 2
    - 3
    - 12
  worlds:
    - "oreWorld"                 #对哪些世界有效
#打怪掉落更多经验(掉落的经验直接加到玩家身上,并且显示给玩家)
dropExp:
  vipPer: "per.fix.dropExp.vip"  #需要的权限
  chance: 3                      #掉落更多经验的几率
  multi: 7                       #额外掉落的经验倍数
#挖矿掉落更多经验(掉落的经验直接加到玩家身上,并且显示给玩家)
mineExp:
  vipPer: "per.fix.mineExp.vip"  #需要的权限
  chance: 10                     #掉落更多经验的几率
  multi: 6                       #额外掉落的经验倍数
#禁止自然生怪的世界列表
banNaturalMonsterWorlds:
  - "houseWorld"
#属于怪物的实体类型
monsterType: "monster"
#使用水桶的权限
per_fix_bucket_water: "per.fix.bucket.water"
#使用岩浆桶的权限
per_fix_bucket_lava: "per.fix.bucket.lava"
#是否在玩家使用岩浆桶或水桶并被取消的时候把桶变成空桶
emptyBucket: true
#领地内倒水/岩浆是否免费!
resFree: true
#倒水/岩浆花费
liquidCost:
  water: 8
  lava: 80
#发射器禁止发射的物品id列表(是被检测的物品的id)
dispenseBan:
  - 8
  - 9
  - 10
  - 11
  - 326
  - 327
  - 342
  - 343
  - 383
  - 407
  - 408
#禁止使用的物品id列表
banUse:
  - 342
  - 343
  - 407
  - 408
#右键生物显示生命值
showHealth:
  item: 0                        #手拿什么物品,0表示空手
  entityType: showHealthEntity   #有效的目标实体类型
#是否取消铁人把目标设定为僵尸
cancelIronGolemTargetZombie: true
#远距离不消失的实体类型
cancelRemoveFaraway: "cancelRemoveFaraway"
#有管理权限的玩家查看远距离不消失的实体类型使用的物品(右键查看生物是否消失)
cancelRemoveItem: 268
#地狱中骷髅自然生成几率降低,百分之多少几率取消生成
lowerSkeleton: 75
#生物吞噬(只吞噬同类,只对LivingEntity有效)
eat:
  maxLevel: 50                   #最大等级
  health:
    mode: 1                      #吞噬后,生命值恢复模式,0表示不变,1表示变为两者相加,2表示恢复成最大生命值
  check:
    timer:                       #定时检测
      interval: 10               #检测间隔,单位秒
      times: 3                   #每次检测的次数(每个世界的检测次数)
  tip:                           #吞噬提示
    enable: true
    range: 8
  range: 15                      #检测范围
  max: 9                         #范围内的同类数量上限,超过则进行吞噬
  entity: "eat"                  #允许吞噬的实体
  worlds:                        #生效的世界
    - "world"
    - "newWorld"
    - "oreWorld"
    - "townWorld"
    - "houseWorld"
    - "world_nether"
    - "world_the_end"
#生物聊天提示
chat:
  checkInterval: 10              #检测间隔,单位秒
  customNameVisiable: false
  maxLength: 30                  #聊天信息最长多少字符
  contents:
    - "你知道吗?如果你看到假矿,说明网络卡了."
    - "服务器论坛:www.minecraft001.com"
    - "服务器QQ一群: 306825355"
    - "服务器QQ二群: 324704149"
    - "服务器QQ三群: 145980465"
    - "输入/cmd可以打开主界面哦"
    - "输入/land或/l可以打开领地界面哦"
    - "服务器YY: 48376279"
    - "为减轻服务器负担,目前部分动物加上了等级"
    - "等级越高的动物掉落也会相应翻倍"
    - "剪羊毛时高等级的羊掉落更多"
    - "鸡生蛋时高等级的鸡也会生更多的蛋"
    - "10级以上的动物死亡可能会掉落动物蛋哦"
    - "20级以上的动物死亡可能会掉落动物头哦"
    - "如果作物种植太密集了,可能会自动掉落哦"
    - "请勿使用高频红石,否则红石线会被自动清除"
    - "偷偷地告诉你,死亡会掉落金钱和耐久"
    - "记得去服务器论坛查看各种帮助"
    - "如果你喜欢用红石,那请不要超频"
    - "地狱和末地都是允许PVP的,进入请小心"
    - "请对自己负责,容器上锁,领地圈好"
    - "不存在没有熊孩子的服务器,请注意保护"
    - "开商店后记得开启领地传送和商店购买权限"
    - "花1分钟时间熟悉一下指令比问要快得多"
    - "生存世界某些权限只能在领地内进行,比如打火石"
    - "文明的游戏可以给大家带来最好的体验"
    - "适当游戏益脑,过度游戏伤身"
    - "以下指令请慎用:/suicide自杀,ALT+F4关闭游戏"
#掉落增加,与生物吞噬的等级有关
drop:
  fix: 30                        #波动,0-100,比如30表示掉落物数量最终会在70%-130%之间
  max: 100                       #掉落数量上限
  egg: 10                        #从几级开始可能掉落蛋
  head: 20                       #从几级开始可能掉落头
  drop1:                         #猪
    id: 90
    health: 10
    drops:
      - "319 1.5"
    egg: 40                      #杀死后掉落对应蛋的几率(如等级10相当于几率为10/40)
    head: 280                    #同上
    headName: "MHF_Pig"          #头所用的玩家
  drop2:                         #羊(羊毛颜色特殊情况)
    id: 91
    health: 8
    shears:                      #不要加羊毛外的其它东西
      - "35 0.8"
    drops:
      - "35 0.9"
    egg: 70
    head: 280
    headName: "SGT_KICYORASS"
  drop3:                         #牛
    id: 92
    health: 10
    drops:
      - "363 1.8"
      - "334 0.8"
    egg: 50
    head: 280
    headName: "MHF_Cow"
  drop4:                         #鸡
    id: 93
    health: 4
    drops:
      - "288 0.6"
      - "365 0.8"
    egg: 70
    fix: 0.5
    head: 350
    headName: "MHF_Chicken"
  drop5:                         #蘑菇牛
    id: 96
    health: 10
    drops:
      - "363 1.8"
      - "334 0.8"
    egg: 250
    head: 300
    headName: "MHF_MushroomCow"
#掉落物提示
dropTip:
  enable: true
  allow: "dropTip"               #允许掉落物提示的生物类型
  range: 8                       #提示范围
  customName: false              #是否使用生物的CustomName
#处于世界中提示
worldTip:
  enable: true
  interval: 180                  #检测间隔,单位秒
  success: 40                    #成功几率,0-100
  tips:
    tip1:
      world: "oreWorld"
      tip: "&6世界提示:&c你正处于矿物世界中,此世界不定时删除重置,请勿存放箱子或建造."
#红石治疗
heal:
  enable: true
  id: 331                        #治疗物(红石)的ID
  cost: "heal"
  recovery: 2
  interval: 800                  #两次治疗的间隔
#################################
#####        抽奖牌         #####
#################################
draw:
  per: "per.fix.draw"            #建立抽奖牌的权限
  flag: "draw"                   #建立的检测标记
  check: "&5[抽奖]"              #检测标记
  name: "&5&l抽奖:"              #不能有空格
  flagUnlimit: "unlimit"         #建立时无限的标记(第三行)
  checkUnlimit: "&a无限"         #检测无限的标记(第三行)
  price: "&1单价: &5{0}金币"     #勿改变,否则需要改变程序代码!
  maxPrice: 1000                 #收费上限
  cost: 100                      #建立抽奖牌花费
  tax: 5                         #收税,0-100
  sneak: true                    #是否需要潜行
  interval: 600                  #使用抽奖的间隔
#################################
#####          夜晚         #####
#################################
#进入白天/黑夜是否提示
tipDayChange: true
#是否取消白天黑暗生怪
dayBlack: false
#恐怖夜晚
night:
  worlds:            #有效的世界名字列表
    - "world"
    - "newWorld"
    - "oreWorld"
  interval: 10       #检测间隔,单位秒
  playerBorn:        #直接在玩家身边出生
    chance: 5        #每次检测成功率
    dark: 4          #检测成功的条件:至少黑暗程度,亮度小于等于这个值都满足
    monster:         #出生的怪物类型id与机率配置
      - "50 5"
      - "51 50"
      - "52 40"
      - "54 70"
      - "57 20"
      - "59 35"
      - "60 15"
  nearBorn:           #在玩家附近出生
    chance: 13
    dark: 5
    minDistance: 6    #成功后怪物出生点与玩家的最小距离
    maxDistance: 14   #成功后怪物出生点与玩家的最大距离
    monster:
      - "50 40"
      - "51 50"
      - "52 40"
      - "54 55"
      - "57 20"
      - "58 15"
      - "59 33"
      - "60 30"
      - "66 12"
#################################
#####        附魔降低       #####
#################################
#附魔最低等级,如果降低后小于此等级则取消降低
enchantMin: 10
#附魔与对应的降低1级的机率(0-100)
#可删除对应的附魔项,与机率为0一样表示不降低附魔等级
enchant:
  - "0 50"
  - "1 20"
  - "2 20"
  - "3 20"
  - "4 20"
  - "5 10"
  - "6 10"
  - "7 10"
  - "16 60"
  - "17 40"
  - "18 40"
  - "19 50"
  - "20 45"
  - "21 50"
  - "32 80"
  - "33 90"
  - "34 85"
  - "35 90"
  - "48 60"
  - "49 65"
  - "50 70"
  - "51 75"
######################################
### 工具加速消耗(考虑了耐久附魔) #####
######################################
#挖方块增加消耗
addConsume:
  - "14 3"
  - "15 2"
  - "16 1"
  - "21 1"
  - "49 5"
  - "52 9"
  - "56 4"
  - "73 1"
  - "74 1"
  - "88 1"
  - "129 4"
  - "153 1"
  
#打火石每次使用加速消耗的机率(默认25)
chanceFire: 0
#打火石加速消耗的点数
addFire: 2

#钓鱼杆每次使用加速消耗的机率(默认30)
chanceFish: 0
#钓鱼杆加速消耗的点数
addFish: 2

#剪刀每次使用加速消耗的机率(默认150)
chanceShears: 0
#剪刀加速消耗的点数
addShears: 1

#弓箭每次发射加速消耗的机率(默认330)
chanceBow: 0
#每次加速消耗的点数
addBow: 1

#以下为木(wood),石(stone),铁(iron),金(gold),钻石(diamond)工具的配置
#chance指每次使用加速消耗的机率,add指每次加速消耗的点数

#木制工具(默认30)
chanceWood: 0
addWood: 1

#石制工具(默认60)
chanceStone: 0
addStone: 2

#铁制工具(默认200)
chanceIron: 0
addIron: 1

#金制工具(默认30)
chanceGold: 0
addGold: 1

#钻石工具(默认1250)
chanceDiamond: 0
addDiamond: 1
#################################
#####    季节与成长修正     #####
#################################
#是否开启季节时间功能(包括动物,作物修正)
enableSeason: false
#作物,动物修正
fix:
  sugarCane: 50                  #多少分之一成功率
  coco: 100                      #多少分之一成功率
  egg: 5                         #鸡蛋生鸡百分之多少几率成功
  cancelMushroomCow: true        #是否取消蘑菇牛的区块与自然生成
  failTipDistance: 6             #生物由于难产而死提示附近玩家的距离
  chances:                       #生物成功出生的几率(难产,由生子而产生)
    - "90 20"
    - "91 25"
    - "92 13"
    - "93 20"
    - "95 15"
    - "96 2"
    - "98 15"
    - "120 1"

#crop1是小麦,胡萝卜,马铃薯;crop2是西瓜,南瓜
time:                
  interval: 120                  #一季多少分钟
  season0: 
