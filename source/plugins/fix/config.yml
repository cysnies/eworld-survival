#####        物品类型       #####
#################################
items:
  heal:
    type: REDSTONE
    amount: 2
  guide:
    type: WRITTEN_BOOK
    meta:
      ==: ItemMeta
      meta-type: BOOK
      title: §a§l新手指导§4§l(必看)
      author: 版本一
      pages:
      - "§4§l§n  === E世界(二周目)===   \n§3§l     §5§l+++§3§l新手指导§5§l+++\n§5§l=======[问\
        题一]=========\n§c§l问:你是个刚入MC的新人,基本玩法都不会?\n§1§l答:那样的话请自己努力学会MC的基本玩法吧.\n§5§l=======[问\
        题二]=========\n§c§l问:这是你玩的第一个服务器?或者说你对一般服务器的基本指令也不清楚?\n§1§l答:是的话请牢记一个指令:§3§\
        l/cmd§1§l(打开主界面),其它的所有帮助都可由此获知"
      - |-
        §5§l=======[问题三]========= §c§l问:你想知道这是什么类型的服务器? §1§l答:E世界二周目的主题是§a§l生存§1§l与§a§l娱乐§1§l,无MOD. §5§l=======[问题四]========= §c§l问:你想知道这个服务器的总体设定?
         §1§l答: §a§l>家园(世界):§1§l在这世界里,每个玩家都有一个自己的家,这个家是完全私人的!无法给其它玩家添加权限!除非
      - §1§l你被盗号否则家园是最安全的!因此以防万一,请尽量将贵重物品放在家园里. §a§l>矿物世界:§1§l这个世界是专门给玩家收集资源的,会不定时重置,因此严禁建造与存放箱子,否则重置后会消失! §a§l>新世界:§1§l设定这个世界是为了解决新人建造房屋不会或者没钱圈领地而被破坏的现象. §1§l每个玩家都可以在这个世界里免费领取一块领地,
      - §1§l与家园的不同之处在于:此领地是可扩展的,并且领地外是无法破坏的,这是强制安全的模式. §3§l领取方法:§1§l1.输入/land进入选择范围界面获取免费领地棒;2.在新世界里找个好地方;3.点击方块;4.如果不与其它领地发生冲突,那么领取免费领地成功,领取的领地以你点击的方块为中心,大小21*21*21
      - §a§l>生存世界:§1§l这个世界是最自由的,也是最不安全的,如果你不圈领地,你的建筑被破坏是迟早的事,不要存着侥幸心理,各大服务器皆如此. §a§l>地狱:§1§l此世界可自由圈地,允许PVP!注意保护自己! §a§l>末地:§1§l此世界无法圈地,允许PVP!请勿建造并注意保护自己!
      - §5§l=======[问题五]========= §c§l问:你想知道如何开始? §1§l答:首先你会出生在家园你的家里,如果想去重生点输入/spawn §1§l1.初期你可以改造你§3§l家园§1§l的家,去§3§l矿物世界§1§l收集资源,并把物品都存放在家园里 §1§l2.然后去§3§l新世界§1§l领取免费的领地,此领地是安全的,也是可不断扩展的 §1§l3.后面你有钱了,可以考虑去§3§l生存世界§1§l圈地(其实新世界也可以自由圈地)
      - §1§l4.后面你装备好了,可以考虑去§3§l地狱§1§l与§3§l末地§1§l探险,抵抗怪物并小心玩家攻击 §4§l§n请勿必不要一开始就去生存世界建造,否则你的建筑没有任何保护!!!
