#功能:
#>定时对所有玩家显示信息
#>定时T出所有玩家并禁止进入
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/kicks/language_cn.yml"
#################################
#####         权限          #####
#################################
#插件管理权限(管理)
per_kicks_admin: "per.kicks.admin"
#################################
#####          配置         #####
#################################
time:
  start:                         #开始提示的时间点,24小时制
    hour: 4
    minute: 0
  interval: 10                   #提示间隔,单位秒
  kick:                          #开始T人的时间点,并且此后到结束前无法再进入
    hour: 4
    minute: 3
  end:                           #结束的时间点,此时间点后玩家才可以进入
    hour: 5
    minute: 0