#功能:
#>tab
#>每周贡献
#>每日礼包
#>玩家信息
#>服务器信息
#>性别心情
#>升级
#>自动称号升级
#>特效
#>邀请
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/infos/language_cn.yml"
#################################
#####         权限          #####
#################################
#插件管理权限
per_infos_admin: "per.infos.admin"
#查看其它玩家信息的权限
per_infos_playerInfo_other: "per.infos.playerInfo.other"
#使用宣传栏宣传的权限
per_infos_bc: "per.infos.bc"
#免费领取礼包的权限
per_infos_gift: "per.infos.gift"
#################################
#####           tab         #####
#################################
tab:
  money:
    pre: "&5[第*]&b"
    period: 1800                 #长期检测间隔,单位秒
    start: 50000                 #进排行的最少数值
    interval: 60                 #短期检测间隔,单位秒
  power:
    pre: "&6[第*]&b"
    period: 2000                 #长期检测间隔,单位秒
    start: 10000                 #进排行的最少数值
    interval: 120                #短期检测间隔,单位秒
#################################
#####       每周贡献        #####
#################################
week:
#################################
#####       每日礼包        #####
#################################
gift:                            #礼包ID(可以不递增) 次数 重置间隔,单位分钟 花费(战斗力) 是否直接添加 提示(此外对应的物品类型是'gift1')
  - "1 5 2880 100 false &6勇者之塔领取"
  - "2 5 2880 130 false &6勇者之塔领取"
  - "3 5 2880 160 false &6勇者之塔领取"
  - "4 8 4320 300 false &6骷髅逃亡领取"
#################################
#####          配置         #####
#################################
item:
  interval: 500                  #查看间隔
  seeInterval: 1500              #触发see的间隔
  confirmTimeLimit: 8            #确认时间限制
  upgradeName: "&a确认升级家园吗?"
  upgradeLore:
  pi:
    name: "&3&l{0}"              #玩家名的显示
  main:
    debt: 27
    fasthelp: 44
    webshop: 17
    info: 4
    serverInfo: 0
    lands1: 12
    lands2: 21
    lands3: 30
    lands4: 39
    rewards: 18
    level: 23
    ticket: 8
    friend: 9
    addBlack: 26
    showBlack: 35
    town: 32
    up: 14
    ad: 41
  set:
    bind: 0
    buyJoin: 4
    upgrade: 8
    chatColor: 12
    chatChannel: 14
    spawn: 18
    xq: 27
    sit: 29
    see: 31
    moveMsg: 33
    serverMsg: 38
    deathMsg: 40
    sideMsg: 42
    sex: 36
  tp:
    house: 0
    spawn: 4
    town: 8
    shop: 13
    mine1: 28
    mine2: 30
    mine3: 32
    mine4: 34
    mon: 36
    attack: 38
    isle: 40
    tower: 42
    run: 44
  join:
    info: 4
#命令(s指服务端命令;p指玩家命令)
cmd:                             #界面 位置 <s/p> 命令(<p>指玩家名)
  - "tp 0 p /house"
  - "tp 4 p /spawn"
  - "tp 8 p /town"
  - "tp 13 p /warp shop"
  - "tp 28 p /warp mine1"
  - "tp 30 p /warp mine2"
  - "tp 32 p /warp mine3"
  - "tp 34 p /warp mine4"
  - "tp 36 p /warp mon"
  - "tp 38 p /warp attack"
  - "tp 40 p /warp isle"
  - "tp 42 p /warp tower"
  - "tp 44 p /warp run"
#玩家信息
playerInfo:
  emptyRight: true               #是否开启空手右键玩家自动发出命令'/cmd 对方'
  emptyRightInterval: 1000       #空手右键玩家间隔
  interval: 3                    #每隔多少分钟更新一次所有在线玩家的信息
  power:
    death: 15                    #死亡减少多少战斗力
    suck: 60                     #[吸灵]吸收多少玩家掉落的战斗力(0-100)
    kill: 40                     #杀玩家掠夺对方多少战斗力
    head: 30                     #掠夺的战斗力达到多少时可能掉头
    headChance: 1                #掉头的几率多少
    headTipRange: 10.0           #提示范围
#服务器信息
serverInfo:
  interval: 5                    #每隔多少分钟更新一次服务器信息,单位分钟(必须是1-5分钟)
  delay: 10                      #下面的延时检测延时多少秒
  clear:                         #自动清除数据库中'玩家日在线时间信息'表里的多余数据,节省空间(服务器启动时延时检测)
    day: 60                      #自动清除的检测天数
  alive:                         #存活玩家数量检测(服务器启动时延时检测)
    day: 30                      #多少天内
    time: 5                      #需要至少在线多少小时
  active:                        #活跃玩家数量检测(服务器启动时延时检测)
    day: 7
    time: 10  
#################################
#####       性别心情        #####
#################################
xq:
  interval: 3000                 #设置间隔
  per: "per.infos.xq"            #设置心情的权限
  cost: 100                      #每次设置心情的花费
#################################
#####         升级          #####
#################################
upgrade:
  levels:
    - "1 1000 1"                 #等级 花费 对应添加的称号ID
    - "2 5000 2"
    - "3 10000 3"
    - "4 30000 4"
    - "5 50000 5"
    - "6 60000 6"
    - "7 70000 7"
    - "8 80000 8"
    - "9 90000 9"
    - "10 100000 10"
    - "11 110000 11"
    - "12 120000 12"
    - "13 130000 13"
    - "14 140000 14"
    - "15 150000 15"
#################################
#####     自动称号升级      #####
#################################
up:
  interval: 313                  #检测间隔,单位秒
#################################
#####         特效          #####
#################################
spec:
  move:                          #移动时显示的特效
    per: "per.infos.spec.move"   #显示此特效的权限
    interval: 8                  #显示间隔,单位tick
    range: 15                    #显示范围
    name: "fireworksSpark"
    offset: 0.3
    speed: 0.08
    count: 12
