#功能:
#>延时关服
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/stops/language_cn.yml"
#################################
#####         权限          #####
#################################
#管理权限
per_stops_admin: "per.stops.admin"
#重启延时中是否禁止玩家加入服务器
banJoin: true
#重启延时结束后是否t出所有玩家
kickAll: true