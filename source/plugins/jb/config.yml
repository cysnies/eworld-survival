#功能:
#>举报
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/jb/language_cn.yml"
#################################
#####         权限          #####
#################################
#插件管理权限
per_jb_admin: "per.jb.admin"
#可以处理玩家举报的管理权限
per_jb_op: "per.jb.op"
#################################
#####          配置         #####
#################################
#使用命令间隔,单位毫秒
speed: 1000
#举报回复数量限制
limit: 18
#每次新建举报会增加的债务,0表示不增加
cost: 100
#管理延时显示举报信息,单位tick
delay: 20
#################################
#####        物品配置       #####
#################################
items:
  main_info:
    type: PAPER