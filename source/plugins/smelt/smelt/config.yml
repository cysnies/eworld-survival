#####宝石#####
#提示:宝石最大等级不能设置超过10级!
gem:
  interval: 600                  #两次操作间隔,单位毫秒
  vipAdd:                        #VIP宝石镶嵌,升级,合成的成功率增加(注意:此地方的增加是比如原来成功率为50%,增加20%,则成功率变为50%*1.2=60%)
