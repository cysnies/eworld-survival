#功能:
#>煅烧
#>绑定石
#>闪电石
#>幸运石
#>修复石
#>封印石
#>特效石
#>武器装备星级
#>鉴定石
#>保护石
#>打孔石
#>宝石
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/smelt/language_cn.yml"
#################################
#####         权限          #####
#################################
#管理权限
per_smelt_admin: "per.smelt.admin"
#VIP权限
per_smelt_vip: "per.smelt.vip"
#################################
#####         配置          #####
#################################
#当玩家右键这些方块时忽略检测
ignore: "ignoreBlock"
#修复武器装备宝石属性bug花费
repairCost: 100
#修复命令使用间隔,单位毫秒
repairInterval: 5000
#################################
#####         锻烧          #####
#################################
#被煅烧的物品ID 煅烧后的物品
smelt:
  - "14 gold"
  - "15 iron"
  - "56 diamond"
#################################
#####        绑定石         #####
#################################
bind:
  checkStone: "&2+绑定石+"
  check: "&2+绑定+"
  times: "&3使用次数:&6 "        #检测与显示用
  owner: "&7所有者:&2 "
  globalTip: 200                 #全服被绑定物品被使用提示间隔,>=0,单位毫秒
  tip: 10                        #绑定物品被其它人使用后的提示间隔,单位秒
#################################
#####        闪电石         #####
#################################
light:
  chance: 10                     #闪电几率固定为多少分之一
  check: "&b+*级闪电+"
  vipAdd: 20                     #vip的闪电效果增加百分之几
  start: 3                       #从哪个位置开始
  left: 4                        #剩下的文字数量
  item: "attackType"             #有效的物品类型
  range: 15                      #闪电显示范围
  min: 1                         #闪电等级下限
  max: 10                        #闪电等级上限
  speed: 800                     #速度上限,单位毫秒
  upgrade:
    max:                         #不同闪电石升级上限
      - "265 4"
      - "266 7"
      - "264 10"
  types:                         #不同闪电石适合的武器类型
    - "265 light_iron"
    - "266 light_gold"
    - "264 light_diamond"
  stone:                         #闪电石
    check: "&b+闪电石+"          #检测标记
    name: "&b[闪电石]&f闪电*"    #名字
    level: "&3等级(上限&5*&3):&6"#等级
    tip: "&6触发闪电后增加*倍伤害!"#提示
#################################
#####        幸运石         #####
#################################
luck:
  check: "&5+幸运石+"            #检测用
  get:                           #物品ID 可以随机获得的物品类型
    - "265 luck_iron"
    - "266 luck_gold"
    - "264 luck_diamond"
#################################
#####        修复石         #####
#################################
repair:
  ignore: "badIngore"            #无脆弱度的物品
  interval: 600                  #两次操作间隔
  vipAdd: 30                     #vip修复效果增加的百分比,0-100
  vipChanceAdd: 6                #vip修复石升级率增加多少
  check: "&5+修复石+"            #检测用
  check2: "&5+劣质修复石+"       #检测用
  check3: "&5+完美修复石+"       #检测用
  chance1: 33                    #劣质修复石升级成功率
  chance2: 70                    #普通修复石升级成功率
  defaultUse: 10                 #默认脆弱度
  checkUse: "&a脆弱度: &5"       #脆弱度,到达0时变为'无法修复'
  checkBad: "&c+无法修复+"       #已经损坏,无法用修复石(或铁砧)修复的检测标记
  item1:
    id: 265                      #物品ID
    effect1: 180                 #效果(装备)
    effect2: 100                 #效果(武器)
    effect3: 50                  #效果(工具)
    effect4: 80                  #劣质的效果(装备)
    effect5: 40                  #劣质的效果(武器)
    effect6: 20                  #劣质的效果(工具)
    effect7: 300                 #完美的效果(装备)
    effect8: 170                 #完美的效果(武器)
    effect9: 90                  #完美的效果(工具)
    type1: "iron_1"              #可以修复的物品类型(装备)
    type2: "iron_2"              #可以修复的物品类型(武器)
    type3: "iron_3"              #可以修复的物品类型(工具)
    up1: "luck_iron_1"           #普通修复石的物品类型
    up2: "luck_iron_7"           #完美修复石的物品类型
  item2:
    id: 266                      #物品ID
    effect1: 180                 #效果(装备)
    effect2: 80                  #效果(武器)
    effect3: 30                  #效果(工具)
    effect4: 80                  #劣质的效果(装备)
    effect5: 30                  #劣质的效果(武器)
    effect6: 10                  #劣质的效果(工具)
    effect7: 300                 #完美的效果(装备)
    effect8: 140                 #完美的效果(武器)
    effect9: 60                  #完美的效果(工具)
    type1: "gold_1"              #可以修复的物品类型(装备)
    type2: "gold_2"              #可以修复的物品类型(武器)
    type3: "gold_3"              #可以修复的物品类型(工具)
    up1: "luck_gold_1"           #普通修复石的物品类型
    up2: "luck_gold_7"           #完美修复石的物品类型
  item3:
    id: 264                      #物品ID
    effect1: 350                 #效果(装备)
    effect2: 250                 #效果(武器)
    effect3: 180                 #效果(工具)
    effect4: 150                 #劣质的效果(装备)
    effect5: 100                 #劣质的效果(武器)
    effect6: 80                  #劣质的效果(工具)
    effect7: 530                 #完美的效果(装备)
    effect8: 400                 #完美的效果(武器)
    effect9: 300                 #完美的效果(工具)
    type1: "diamond_1"           #可以修复的物品类型(装备)
    type2: "diamond_2"           #可以修复的物品类型(武器)
    type3: "diamond_3"           #可以修复的物品类型(工具)
    up1: "luck_diamond_1"        #普通修复石的物品类型
    up2: "luck_diamond_7"        #完美修复石的物品类型
#################################
#####        封印石         #####
#################################
seal:
  vipAdd: 25                     #vip封印成功率增加百分比,如原来成功率是10,增加50%就是15
  check: "&5+封印石+"            #检测用
  times: "&3使用次数: &6"        #检测与显示用
  item1:
    id: 265                      #物品ID
    chance:                      #实体ID 成功率 (不在列表内的是无法封印的类型)
      - "90 70"                  #猪
      - "91 70"                  #羊
      - "92 40"                  #牛
      - "93 80"                  #鸡
  item2:
    id: 266
    chance:
      - "90 70"                  #猪
      - "91 70"                  #羊
      - "92 40"                  #牛
      - "93 80"                  #鸡
      - "94 30"                  #鱿鱼
      - "95 10"                  #狼
      - "98 10"                  #豹猫
  item3:
    id: 264
    chance:
      - "90 70"                  #猪
      - "91 70"                  #羊
      - "92 40"                  #牛
      - "93 80"                  #鸡
      - "94 30"                  #鱿鱼
      - "95 10"                  #狼
      - "96 3"                   #蘑菇牛
      - "98 10"                  #豹猫
      - "100 5"                  #马
