    upgrade: 25
    combine: 25
  checkType:                     #为了提高各种事件检测效率而加的
    attack: "gemAttackType"
    bow: "gemBowType"
    armor: "gemArmorType"
  upgrade:                       #宝石升级
    up: "&a+可升级+"
    end: "&c+无法升级+"
