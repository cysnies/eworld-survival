#################################
#####     武器装备星级      #####
#################################
star:
  empty: "&#x3007;"              #未镶嵌宝石时星级显示,用的UTF8码
  fill: "&#x06DE;"               #已镶嵌宝石时星级显示,用的UTF8码
  color:                         #星级显示的颜色
    default: "e"                 #没有满足的等级默认显示的颜色
    levels:                      #等级与显示的颜色
      - "1 e"
      - "2 e"
      - "3 a"
      - "4 a"
      - "5 1"
      - "6 1"
      - "7 5"
      - "8 5"
      - "9 6"
      - "10 6"
#################################
#####        鉴定石         #####
#################################
jd:
  vipAdd: 20                     #vip鉴定成功率增加,0-100
  check: "&5+鉴定石+"            #检测用
  item1:
    id: 265                      #物品ID
    chance: 70                   #成功率,0-100
    max: 4                       #鉴定成功后最大鉴定出的星级
    type: "jd_iron"              #可以鉴定的物品类型
  item2:
    id: 266
    chance: 70
    max: 6
    type: "jd_gold"
  item3:
    id: 264
    chance: 70
    max: 8
    type: "jd_diamond"
  tipLevel: 5                    #玩家鉴定出多少星级及以上时全服通告           
  levels:                        #鉴定成功出的星级,概率
    - "1 485"
    - "2 700"
    - "3 500"
    - "4 180"
    - "5 85"
    - "6 35"
    - "7 15"
    - "8 4"
#################################
#####        保护石         #####
#################################
protect:
  check: "&5+保护石+"            #检测用
#################################
#####        打孔石         #####
#################################
dig:
  vipAdd: 8
  check: "&5+打孔石+"            #检测用
  type:
    - "265 jd_iron"
    - "266 jd_gold"
    - "264 jd_diamond"
  chance:                        #当前星级 打孔成功率  (提示:无法超过装备本身的限制)
    - "1 90"
    - "2 50"
    - "3 33"
    - "4 25"
    - "5 20"
    - "6 16"
    - "7 14"
  tipLevel: 5                    #打孔成功出多少及以上星级时全服提示
#################################
#####         宝石          #####
