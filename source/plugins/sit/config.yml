#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/sit/language_cn.yml"
#################################
#####         权限          #####
#################################
#管理权限
per_sit_admin: "per.sit.admin"
#坐上椅子的权限
per_sit_use: "per.sit.use"
#################################
#####         配置          #####
#################################
sit:
  sneaking: true                  #坐上椅子是否要求按下sneaking
  rotate: true                    #玩家坐上椅子后是否自动调整朝向
  distance: 1.2                   #玩家坐上椅子的最大距离,为0表示取消距离限制
  sittingheight: 0.7              #坐的高度
  interactCancel: true            #玩家坐椅子上与方块交互时是否取消坐椅子
  addGold:                        #每interval秒检测一次,每次有chance/100几率检测成功,成功后增加的金币为:取x=(min,max),然后x=x+(在线玩家数/player)*fix,最后,如果x小于min则取min,大于max则取max,最终的x就是增加的金币数
    interval: 60
    chance: 100
    amount:
      from: 3
      to: 6
      min: 1
      max: 7
      player: 20
      fix: -1
  canSitList:                     #可以坐的方块列表
    - 53
    - 67
    - 108
    - 109
    - 114
    - 128
    - 134
    - 135
    - 136
    - 156
  notObstacle:             #椅子上的非障碍物方块id列表
    - 63
    - 68
    