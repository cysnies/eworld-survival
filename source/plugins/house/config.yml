#################################
#####       语言文件        #####
#################################
language: "plugins/house/language_cn.yml"
#################################
#####         权限          #####
#################################
#管理权限
per_house_admin: "per.house.admin"
#################################
#####          配置         #####
#################################
addFlags:                       #家创建后自动添加的标记
  - "house:0"
  - "banInteract:0"
  - "banBucket:0"
  - "banTp:0"
  - "banEye:0"
  - "banPvp:0"
  - "protect:0"
  - "banShop:0"
houseWorldName: "houseWorld"
house:
  suf: "的家"             #默认后缀(如'你进入了 xxx 的家')
  level: 1000             #家领地的等级
  start: 2                #从第几层开始(实际上领地最下面会比这个高一层,这样可以让玩家无法挖下去)
  initHeiht: 20           #家初始高度
  size: 30                #每个家包括边缘大小为size*size*initHeight
  edgeSize: 3             #家边缘大小(x与z)
  spawn:
    x: 12.5
    y: 1.0
    z: 12.5
    yaw: -180.0
    pitch: 0.0 
  generate:
    clear: false          #每个家开始生成的时候是否清除家及其上空所有方块
    houseFile: "house.schematic"    #使用的家文件
upgrade:
  cost: 3000              #升级家每次花费
  amount: 10              #升级家每次增加的高度
  max: 250                #Y轴最大高度
