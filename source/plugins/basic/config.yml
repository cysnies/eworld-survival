#功能:
#>MOTD
#>自动保存
#>世界读取
#>进出服务器提示
#>AFK
#>物品价值
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/basic/language_cn.yml"
#################################
#####         权限          #####
#################################
#管理权限
per_basic_admin: "per.basic.admin"
#开启/关闭玩家进出服务器提示的权限
per_basic_serverMsg: "per.basic.serverMsg"
#################################
#####          MOTD         #####
#################################
#设置为空表示不改变
motd: "&3&lE世界&6&l(二周目) &a&l论坛:&3&l&nwww.minecraft001.com&a&l         QQ群:&b&l306825355 &a&lYY:&b&l48376279"
#################################
#####        自动保存       #####
#################################
#自动保存所有世界的间隔,单位秒,设置为0表示禁用此功能
saveInterval: 480
#################################
#####       世界读取        #####
#################################
#将被读取(不存在则创建)的世界列表
worlds:
  - "world"
  - "newWorld"
  - "houseWorld"
  - "oreWorld"
  - "world_nether"
  - "world_the_end"
  - "townWorld"
#################################
#####   玩家进出服务器提示   ####
#################################
#模式2显示时间
dur: 5
#是否使用玩家显示名,false将直接使用玩家名字
displayName: true
#################################
#####          AFK          #####
#################################
#是否开启自动AFK
afk: true
#与椅子(sit)插件挂钩后当玩家坐在椅子上时是否不设置AFK
checkSit: true
#单位秒,当玩家位置无改变达到这个时间后自动踢出
afkTime: 300
#单位秒,afk检测间隔
afkCheckInterval: 10
#################################
#####       物品价值        #####
#################################
#类型(不用太精确)
types:                           #类型ID 类型名 计算方法(0表示普通,即只用ID与小ID即可计算;1表示特殊计算法)
  - "1 建筑方块 0"               #普通计算法,那些较便宜的建筑方块
  - "2 杂物 0"                   #普通计算法,那些较便宜的杂物
  - "3 矿物 0"                   #普通计算法,矿物
  - "4 食物 0"                   #普通计算法,食物
  - "5 贵重物品 0"               #普通计算法,贵重方块物品(同时非矿物)
  - "6 特殊物品 0"               #普通计算法,特殊物品(有各种命令石,各种幸运石,各种修复石,各种特效石,各种鉴定石,各种保护石,各种打孔石,各种宝石,各种副本石)
  - "7 武器 1"                   #特殊计算法,武器(考虑附魔,耐久度,特效石,宝石效果,剩余星级)
  - "8 装备 1"                   #特殊计算法,装备(考虑附魔,耐久度,宝石效果,剩余星级)
  - "9 工具 1"                   #特殊计算法,工具(考虑附魔,耐久度)
  - "10 药水 1"                  #特殊计算法,药水(考虑药效类型,时间)
  - "11 附魔书 1"                #特殊计算法,附魔书(考虑附魔类型,等级)
#作用: 用来随机获取指定价值指定类型(s)的物品
