#功能:
#>哈希列表(列表的有序性,检测的高效性,集合的唯一性,但占用内存更多)
#>配置文件
#>语言文件
#>物品按钮
#>经济
#>权限
#>物品
#>附魔
#>药效
#>耐久度
#>奖励
#>复制物品
#>名字映射
#>真实伤害事件
#>计分板改变(提示:使用此功能后,服务器内不能有其它插件的功能是改变计分板的,否则会产生冲突)
#  >玩家前缀
#  >玩家后缀
#  >侧边栏显示信息
#>速度
#>类型
#>堆叠
#>时间
#>白天黑夜
#>NBT编辑类
#>输入管理
#>玩家真名
#>滚动条
#>Tab
#>债务
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/lib/language_cn.yml"
#################################
#####         权限          #####
#################################
#插件管理权限
per_lib_admin: "per.lib.admin"
#################################
#####       哈希列表        #####
#################################
#################################
#####       配置文件        #####
#################################
#################################
#####       语言文件        #####
#################################
#################################
#####       物品按钮        #####
#################################
