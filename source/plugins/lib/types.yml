#功能:
#>类型
#################################
#####          配置         #####
#################################
#名字只能包括字母,数字与下划线,且以字母或下划线开头
#继承注意不要形成死循环

#mode:1表示除types外的类型都不满足;2表示除types外的类型都满足
#inherit:继承,结果取并集
#types:类型列表

#方块或物品类型列表的元素可以是: 
#  - <方块或物品类型名|类型ID>[:小ID]

#实体类型列表的元素可以是:
#  - 实体类型名(注意:是枚举的名而非显示名;此外,部分实体无唯一的ID,只能通过此类型名来指定)
#  - 实体类型ID

#命令类型列表的元素可以是:
#  - 命令名

types:
  item:                   #方块或物品ID
    #表示所有的方块与物品
    all:
      mode: 2
      inherit:
      types:
    #表示矿物方块
    oreBlocks:
      mode: 1
      inherit:
      types:
        - 14
        - 15
        - 16
        - 21
        - 56
        - 73
        - 74
        - 129
    #表示安全的方块,玩家站方块里跟空气等同
    safeBlocks:
      mode: 1
      inherit:
      types:
        - 0
        - 6
        - 31
        - 32
        - 37
        - 38
        - 39
        - 40
        - 50
        - 55
        - 59
        - 63
        - 64
        - 65
        - 66
        - 68
        - 69
        - 70
        - 71
        - 72
        - 75
        - 76
        - 77
        - 78
        - 83
        - 93
        - 94
        - 104
        - 105
        - 106
        - 111
        - 115
        - 131
        - 132
        - 141
        - 142
        - 143
        - 147
        - 148
        - 149
        - 150
        - 157
  entity:                  #实体ID
    #所有实体
    all:
      mode: 2
      inherit:
      types:
    #动物
    animal:
      mode: 1
      inherit:
      types:
        - 90
        - 91
        - 92
        - 93
        - 95
        - 96
        - 98
  cmd:                    #命令
    #所有命令
    all:
      mode: 2
      inherit:
      types:
    #登录相关命令
    log:
      mode: 1
      inherit:
      types:
        - "r"
        - "reg"
        - "register"
        - "l"
        - "login"
        - "logout"