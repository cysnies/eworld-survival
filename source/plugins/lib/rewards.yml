#功能:
#>奖励
#################################
#####          配置         #####
#################################
#注意:一项内的经验与等级最多只能选其一,另一个必须为0,否则奖励会出问题
rewards:
  rewards1:                      #奖励类型
    money:
      min: 100
      max: 100
    exp:
      min: 10
      max: 10
    level: 
      min: 0
      max: 0
    tip: ""
    costType: ""                 #花费,可留空
    itemsType: ""                #物品类型,可留空.1.用:分隔,前面表示插件名,后面表示类型名;2.不用:分隔,则表示类型名,插件名默认为此配置所属插件
    enchantsType: ""             #附魔类型,可留空.1.用:分隔,前面表示插件名,后面表示类型名;2.不用:分隔,则表示类型名,插件名默认为此配置所属插件