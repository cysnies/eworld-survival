#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/cus/language_cn.yml"
#################################
#####         权限          #####
#################################
#管理权限
per_cus_admin: "per.cus.admin"
#################################
#####         配置          #####
#################################
#设置用的物品
setItem: 339
#显示怪物点用的物品ID
showItem: 89
#显示路径点用的物品ID
showPathItem: 89
#显示怪物点列表的页面大小
pageSize: 10
#检测巡逻的间隔,单位tick
moveInterval: 14
#与目标点距离多少时当作达到
near: 1.6
#巡逻最大停留时间,超过则前往下个巡逻点,单位毫秒
maxWaitTime: 3500
#巡逻强制传送回去的最大停留时间,超过则直接传送下个巡逻点,单位毫秒
maxTpWaitTime: 10000
#清理巡逻位置缓存,单位秒
clearInterval: 3600
#怪物动作提示范围
tipRange: 8

animal:
  - "90 15"
  - "91 15"
  - "92 20"
  - "93 10"
  - "94 10"
  - "96 30"
