lang_480: "\n\n\n
           &6======= [&3&l邀请制度&6] =======\n
           &b- &c说明: &e邀请或被邀请均能获得5钻VIP奖励!!!\n
           &b- &c注意: &e1.邀请人无法修改 2.可邀请玩家上限是10\n
           &6======= [&3&l邀请石获取&6] =======\n
           &b- &a1.免费获取,进服后&l自动获取&a,只能获取一个,条件:\n
           &b-   &7放置数>10000,挖矿数>10000,杀怪数>300,总在线>1天\n
           &b- &a2.购买获取,花费&5800&a金币/个\n
           &6======= [&3&l被邀请&6] =======\n
           &b- &a直接获得&5&l3&a小时免费5钻VIP&7(且只能被邀请一次)\n
           &6======= [&3&l邀请其它玩家&6] =======\n
           &b- &a当你邀请的&c&l每个&a玩家满足条件时,你都会获得VIP奖励:\n
           &b- &a一.你的奖励:&5&l5&a小时5钻VIP.&7需要对方达到条件:\n
           &b-   &7破坏数>100,放置数>100,挖矿数>100,杀怪数>10,总在线>1小时\n
           &b- &a二.你的奖励:&5&l48&a小时5钻VIP.&7需要对方达到条件:\n
           &b-   &7破坏数>1000,放置数>8000,挖矿数>10000,杀怪数>300,总在线>1天\n
           &b- &a三.你的奖励:&5&l96&a小时5钻VIP.&7需要对方达到条件:\n
           &b-   &7破坏数>5000,放置数>30000,挖矿数>50000,杀怪数>500,总在线>3天\n
           &6=========================================="
           
