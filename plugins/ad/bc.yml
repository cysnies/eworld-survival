vip:
  pre: §5§l【赞助VIP】§c
  msg:
  - 成为VIP后可以每日在重生点领取礼包哦~
  - 蓝钻VIP在矿物世界挖矿时可以拥有动态光源,省去手动插火把的麻烦(火把放物品栏第七格)
  - 购买紫钻炫酷VIP可以获得[狂帅酷拽吊炸天]的称号.
  - 只要无偿赞助服务器10元即可获得永久的[赞助]称号(购买使用赞助石即可)
  - 如果你看完帮助后仍然不懂如何购买点券,可以加服主QQ§52513384727
  - 为了服务器的持续发展与玩家的公平,点券只能用来购买VIP!无法单独购买金币或物品.
  - 服务器的点券可以使用自动充值平台来充值,当然也可以手动联系服主充值.
  - 服务器一共有5种钻的VIP,每钻只要10元/月,可以视需要单独购买或同时拥有.
  - 服务器每月需要交纳电费,带宽费,维护费等,为了服务器的长期发展,请大家多多支持~
  - 红钻经济VIP拥有0.05/格的领地价格,转帐免税,收费门免税,聊天花费更少,商店数量上限200等权限,让你花钱更少,赚钱更易.
  - 黄钻经验VIP可以让你在打怪,挖矿,熔炉获得经验时掠夺更多的经验,升级变得更简单.
  - 蓝钻自由VIP可以拥有加入满人服,传送无延迟,随机传送冷却时间更短,聊天间隔限制更小,死亡物品耐久不下降,动态火把,随身工作台,设置心情等权限.
  - 绿钻幸运VIP可以拥有修复石效果加强,鉴定,打孔,镶嵌,升级,合成几率更高,神之技能+万金油+,神之技能+挖矿祝福+,神之技能+战争祝福+等权限
  - 紫钻炫酷VIP可以拥有行走特效,帽子权限(/hat),领地'fly'标记权限,此外还有免费的聊天颜色与粗体.
  - 想拥有更炫酷的设置心情权限吗?获得[红石]或[蓝钻VIP]即可.
  - 不同钻的VIP可以同时拥有,也可以使用同种钻多次来续费多个月,奖励也会相应地发多次,不用担心会有损失.
  - 每个玩家都有免费获取五钻VIP的机会哦,使用邀请码即可,具体可上论坛查看.
  - 输入/cmd购买邀请石然后邀请其它玩家来服务器,把邀请石扔给对方使用,对方玩得越久你可以获得的好处也越大哦.
  - 想立即免费获得VIP吗?快使用邀请石吧.
  - 目前增加了首充大礼包,只能领取一次,输入/cmd进入点券操作界面可在右上角查看.
land:
  pre: §b§l【领地帮助】§c
  msg:
  - 每个玩家都可以在新世界免费领取一块领地哦(免费领地棒输入/land进入选择界面后可点击领取)
  - 领地标记是干吗的?标记即领地功能,没有标记的领地就相当于一个空壳,除了进出提示与传送外对其它玩家无任何限制作用,照样可以破坏.
  - 小区是更高级的领地,建立小区后可以在小区内再建立若干地皮.地皮可以出售给玩家,或者不出售给玩家而只分配玩家权限.
  - 地皮有两种选择:1.出售给玩家,这样你就没有权利操作地皮,但玩家会感到安全;2.不出售给玩家只给玩家添加权限,这样你就可以完全地控制地皮,但玩家可能觉得不安全
  - 小区是一种高级的领地,小区内可以建立地皮,地皮可以出售,实现你建立安全易管理村庄的愿望.
  - 领地的'fly'标记可以使玩家在领地内飞行,再也不用担心建筑摔死了§7(需要获得[紫钻VIP]或[绿宝石]称号)
  - 想让领地允许PVP?删除'banPvp'标记即可.
  - ''
