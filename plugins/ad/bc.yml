main:
  pre: §a§l【系统公告】§c
  msg:
  - 装备如果脆弱度降为0将无法修理!
  - '[完美修复石]不会影响降低装备的脆弱度.'
  - 铁砧修理与劣质或普通修复石每次修复时都会降低装备的脆弱度.
  - 由于岩浆容易卡服,而且难以清理,因此服务器禁止了岩浆流动.
  - 广告宣传使用颜色与格式字符可以更加吸引人.
  - 你只需要获得[泥土]称号,即可获得广告宣传的权限.
  - 为什么你的广告宣传经常看不到?那说明其它人投入的宣传费更高.
  - 服务器每天早上4-5点自动备份,期间无法进服§7(若出意外必须回档,则回档时间不会超过1天)
  - 本服务器最基本最重要的命令是§3§l/cmd§6,请务必不要忘记!!!
  - 为了防止玩家使用作弊器挂机刷物品或经验,在离开300秒后玩家会被自动踢出.
  - 动物如何升级?当动物养多后便会自动吞噬升级哦.
  - 动物级别有什么用?动物等级越高,死亡掉落越多,此外越高等级的动物死亡后掉落相应蛋或头的几率也越高哦~
  - 你知道吗?高等级的羊剪羊毛掉落更多,高等级的鸡一次生蛋也越多哦.
  - 非VIP玩家可以将红石放在物品栏第8格来加粗聊天颜色,使之更吸引人哦.
  - 非VIP玩家可以将染料放在物品栏第9格,这样聊天就可以拥有对应的颜色哦.
  - 服务器增加了性别显示,大家可以选择自己喜欢的性别来游戏.
  - 服务器每次重启时会重新检测分配部分称号,包括战神,战圣,战王,首富,财主,豪富等.
  - 你知道吗?只要挂在YY上,即使什么也不做,贡献达到后即可向管理索取称号哦.
  - 不会建立商店?只要手拿物品点击箱子即可,然后根据提示操作.
  - 家园是最安全的地方,无法给其它玩家权限,强烈建议玩家将容器等贵重物品放在家园!
  - 服务器会自动检测并停止大面积流水,但请玩家保持素质第一,不要乱倒液体.
  - 假矿会增大服务器压力,但为了保证游戏的公平却又是绝对不可少的无奈的措施,请大家谅解.
  - 如果你看到假矿,证明一件事,就是你网络卡了(或服务器网络卡了),可以尝试退出重进.
  - 服务器会自动检测高频并可能清理红石线,请轻轻地使用红石电路~
  - 如果你作物种植太密集了,可能会自动掉落,这是服务器防大面积种植卡服的措施.
  - 服务器卡时可能会自动清理掉落物,但贵重的掉落物如信标,钻石剑等都不会清理.
  - 抽奖牌建立方法:在发射器前放置牌子,第一行写'draw',第二行写价格即可(需要获得[煤炭]称号才能拥有权限)
  - 不知道如何获得等级类型的称号?在主界面点击升级按钮即可.
  - 为了减少交易欺骗,目前商店建立花费已经降为30,玩家大额交易时请尽量使用商店进行.
  - 10级以上的动物死亡后可能会掉落相应的动物蛋哦,等级越高几率越高~
  - 20级以上的动物死亡后有小概率会掉落相应的动物头哦,等级越高几率越高~
  - 击杀玩家后,如果对方战斗力有下降,就可能掉落头哦~
  - 活跃说明:最近7天总在线达到10小时即可获得[活跃]称号,不足10小时则会失去[活跃]称号.
  - 存活说明:最近30天总在线达到5小时即可获得[存活]称号,不足5小时则会失去[存活]称号.
  - 邀请石使用得当最多可以使你获得约1500小时的五钻VIP,具体说明论坛上查看.
  - 物品本身在掉落一定时间后会消失,与服务器无关,请务必不要乱扔贵重物品.
