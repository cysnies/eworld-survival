#################################
#####       语言文件        #####
#################################
#语言文件相对路径
language: "plugins/land/language_cn.yml"
#################################
#####         权限          #####
#################################
#插件管理权限
per_land_admin: "per.land.admin"
#################################
#####    领地安全性检测     #####
#################################
#标记检测说明:标记权限为所有玩家=无标记(事实上像fly标记这是不相等的,但这里的检测不考虑这些情况)
#此外会检测admin这一特殊标记
check:
  per: "per.land.check"          #检测领地安全性的权限
  check1:
    tip: "&3防破坏检测:"
    flags:
      - banBreak
      - banInteract
  check2:
    tip: "&3防放置检测:"
    flags:
      - banPlace
      - banInteract
  check3:
    tip: "&3防偷窃(开容器)检测:"
    flags:
      - banContainer
      - banInteract
  check4:
    tip: "&3防使用按钮检测:"
    flags:
      - banButton
      - banInteract
  check5:
    tip: "&3防使用门检测:"
    flags:
      - banDoor
      - banInteract
  check6:
    tip: "&3防乱使用物品检测:"
    flags:
      - banUseOther
      - banInteract
  check7:
    tip: "&3防右键生物(如打开马背包与动物被偷偷封印走)检测:"
    flags:
      - banContact
  check8:
    tip: "&3防伤害动物,村民,马检测:"
    flags:
      - protect
  check9:
    tip: "&3防进来偷窥检测:"
    flags:
      - banMove
  check10:
    tip: "&3防倒水/岩浆检测:"
    flags:
      - banBucket
      - banInteract
  check11:
    tip: "&3防领地外水/岩浆流入检测:"
    flags:
      - banFlow
  check12:
    tip: "&3防点火烧人检测:"
    flags:
      - banIgnite
      - banInteract
  check13:
    tip: "&3防瞬间伤害或毒药伤害生物检测:"
    flags:
      - banPotionHurt
  check14:
    tip: "&3防PVP检测:"
    flags:
      - banPvp
  check15:
    tip: "&3防其它玩家在领地内建立商店检测:"
    flags:
      - banShop
      - banInteract
  check16:
    tip: "&3防其它玩家使用领地传送检测:"
    flags:
      - banTp
  check17:
    tip: "&3防玩家使用末影珍珠传送检测:"
    flags:
      - banEye
  check18:
    tip: "&3防蠹虫打洞检测:"
    flags:
      - banEntityChange
#################################
#####        flag配置       #####
#################################
admin:
  use: true
  per: "per.land.flag.admin"
  tip: "总权限(特殊标记!指所有领地标记的权限)"

banBonemeal:
  use: true
  per: "per.land.flag.banBonemeal"
  tip: "禁止使用骨粉"
  
banBreak:
  use: true
  per: "per.land.flag.banBreak"
  tip: "禁止打破方块/挂画"
  
banBucket:
  use: true
  per: "per.land.flag.banBucket"
  tip: "禁止水/岩浆桶倒/装"
  
banButton:
  use: true
  per: "per.land.flag.banButton"
  tip: "禁止使用&7(拉杆,按钮,压力板)"
  blockType: "button"
  
banCheckMove:
  use: false
  per: "per.land.flag.banCheckMove"
  tip: "禁止检测移动"
  
banClear:
  use: false
  per: "per.land.flag.banClear"
  tip: "禁止怪物,动物被清理"
  
banCmd:
  use: true
  per: "per.land.flag.banCmd"
  tip: "禁止使用命令(少数除外)"
  canUse:                        #禁止使用命令的领地可以使用的命令列表
    - "c"
    - "chat"
    - "money"
    - "balance"
    - "stats"
    - "sit"
    - "balancetop"
    - "msg"
    - "suicide"
    - "sm"
    - "dm"
    - "serverMsg"
    - "deathMsg"
    
banConsume:
  use: false
  per: "per.land.flag.banConsume"
  tip: "禁止使用消耗品"
  types:                         #标记值 禁止使用的物品类型
    - "0 consume_all"
    
banContact:
  use: true
  per: "per.land.flag.banContact"
  tip: "禁止与生物交互&7(指右键生物)"
  contact: "contact"

banContainer:
  use: true
  per: "per.land.flag.banContainer"
  tip: "禁止打开容器&7(箱子,末影箱,熔炉,漏斗,发射器,投掷器,酿造台,唱片机)"
  blockType: "container"

banDoor:
  use: true
  per: "per.land.flag.banDoor"
  tip: "禁止使用门&7(木门,铁门,栅栏门,活板门)"
  blockType: "door"
  
banEat:
  use: false
  per: "per.land.flag.banEat"
  tip: "禁止动物吞噬"
  
banEntityChange:
  use: true
  per: "per.land.flag.banEntityChange"
  tip: "禁止实体改变方块&7(蠹虫,末影人)"
      
banEye:
  use: true
  per: "per.land.flag.banEye"
  tip: "禁止使用末影珍珠&7(包括传送进来,出去,在里面传送)"
      
banFlow:
  use: true
  per: "per.land.flag.banFlow"
  tip: "禁止水/岩浆流动"
      
banFly:
  use: true
  per: "per.land.flag.banFly"
  tip: "禁止飞行"
  
banHide:
  use: true
  per: "per.land.flag.banHide"
  tip: "禁止隐身药效"
  interval: 30                      #多少tick检测一次(修改必须重启服务器才能生效)
  
banIgnite:
  use: true
  per: "per.land.flag.banIgnite"
  tip: "禁止点火&7(打火石,火球,火)"
  igniteType: "ignite"
  
banInteract:
  use: true
  per: "per.land.flag.banInteract"
  tip: "禁止接触&7(禁止接触任何方块挂画)"
  
banMonster:
  use: true
  per: "per.land.flag.banMonster"
  tip: "禁止怪物出生"
  monsterType: "monster"
  
banMove:
  use: true
  per: "per.land.flag.banMove"
  tip: "禁止移动"
  interval: 14                      #检测间隔,单位tick
  distance: 1.0                     #移动的距离
  
banPhysical:
  use: true
  per: "per.land.flag.banPhysical"
  tip: "禁止物理现象&7(着火,烧毁,融化,形成,(树苗)生长,蔓延,树叶掉落,方块物理现象)"
  infos:                            #是否限制(true表示限制)
    info0:
      burn: true                    #烧毁
      fade: true                    #融化
      form: true                    #形成
      grow: true                    #生长
      ignite: true                  #着火
      spread: true                  #蔓延
      decay: true                   #树叶掉落
      structure: true               #树苗生长
      physics: true                 #方块物理现象
    info1:
      burn: true
      fade: true
      form: true
      grow: true
      ignite: true
      spread: true
      decay: true
      structure: true
      physics: false
  
banPlace:
  use: true
  per: "per.land.flag.banPlace"
  tip: "禁止放置方块/挂画或接触展示框"
  
banPotionHurt:
  use: true
  per: "per.land.flag.banPotionHurt"
  tip: "禁止玩家药水伤害生物(剧毒,瞬间伤害药水)"

banPvp:
  use: true
  per: "per.land.flag.banPvp"
  tip: "禁止PVP"
  
banShop:
  use: true
  per: "per.land.flag.banShop"
  tip: "禁止其它玩家在领地内建立商店"
  
banSit:
  use: true
  per: "per.land.flag.banSit"
  tip: "禁止玩家在领地内使用坐椅功能."
  
banStupid:
  use: false
  per: "per.land.flag.banStupid"
  tip: "禁止刷怪笼出愚蠢的怪物"
  
banTp:                               #指禁止传送领地传送点
  use: true
  per: "per.land.flag.banTp"
  tip: "禁止领地传送"
  
banTpIn:
  use: true
  per: "per.land.flag.banTpIn"
  tip: "禁止传送进来&7(但可以在里面传送或传送出去)"
   
banTpOut:
  use: false
  per: "per.land.flag.banTpOut"
  tip: "禁止传送出去&7(但可以在里面传送或传送进来)"
   
banUse:
  use: true
  per: "per.land.flag.banUse"
  tip: "禁止使用&7(音符盒,工作台,附魔台)"
  blockType: "use"
    
banUseOther:
  use: true
  per: "per.land.flag.banUseOther"
  tip: "禁止使用其它物品方块&7(蛋糕,床,TNT,炼药锅,信标,铁砧,中继器,比较器)"
  blockType: "useOther"
  
dis:
  use: false
  per: "per.land.flag.dis"
  tip: "无限型发射器"
 
#对于刷怪笼出生的怪物,掉落战功与金币增加;对于羊,数据值为增加掉落的羊毛数量
dropAdd:
  use: false
  per: "per.land.flag.dropAdd"
  tip: "掉落增加"

fixBug:
  use: true
  per: "per.land.flag.fixBug"
  tip: "领地无此标记:禁流水允许活塞;领地有此标记:允许流水禁活塞"

fly:
  use: true
  per: "per.land.flag.fly"
  tip: "(允许并强制)飞行"
  
forcePvp:
  use: false
  per: "per.land.flag.forcePvp"
  tip: "强制PVP(会覆盖banPvp标记)"
  
house:
  use: false
  per: "per.land.flag.house"
  tip: "家的标记"
  
mine:                   #矿场为1-9级
  use: false
  per: "per.land.flag.mine"
  tip: "矿场"
  checkInterval: 50     #检测间隔,单位秒
  preTip: 5             #矿场刷新前几分钟全服提示
  minStone: 0.55        #最高级9级的矿场石头机率变为原来的多少倍
  ore:                  #矿物的id与机率(第一个必须为石头)
    - "1 2500"
    - "3 50"
    - "12 70"
    - "13 80"
    - "14 30"
    - "15 60"
    - "16 90"
    - "21 30"
    - "41 3"
    - "42 5"
    - "46 2"
    - "49 15"
    - "56 40"
    - "73 35"

poisonWater:
  use: true
  per: "per.land.flag.poisonWater"
  tip: "毒水"
  
potion:
  use: false
  per: "per.land.flag.potion"
  tip: "药效"
  interval: 2                 #检测添加药效间隔,单位秒
  infos:                      
    info1:                    #药效名 时间(tick) 等级(0开始)
      - "BLINDNESS 99999 0"
      - "SLOW 99999 2"
    info2:
      - "SPEED 100 1"
  
protect:
  use: true
  per: "per.land.flag.protect"
  tip: "保护生物&7(猪,羊,牛,鸡,鱿鱼,狼,蘑菇牛,雪傀儡,铁傀儡,豹猫,马,村民)"
  protectType: "protect"
         
safe:
  use: true
  per: "per.land.flag.safe"
  tip: "死亡无惩罚"

storm:
  use: true
  per: "per.land.flag.storm"
  tip: "下雨/雪"

suck:
  use: true
  per: "per.land.flag.suck"
  tip: "吸灵(玩家在领地内死亡后会吸收部分掉落的金币与战功)"
#################################
#####      handler配置      #####
#################################
buy:
  perMaxLands: "per.land.handler.buyMaxLands"        #购买领地上限的权限
  land:
    maxCost: 3000                                    #增加一个最大领地数量的花费
  name: "&4确认花费&3{0}&4金币购买吗?"
  lore:
    
cmd:
  per: "per.land.handler.cmd"                        #设置领地命令权
    
create:
  nameCheckNumber: true                              #true表示禁止全数字领地创建
  per: "per.land.handler.create"                     #创建'领地'权限
  perNoLimit: "per.land.handler.create.noLimit"      #不受大小限制权限
  banWords:                                          #禁止使用的名字(包括小区与地皮的名字)(忽略大小写)
    - "reload"
  buyWorld:                #玩家可自由购买领地的世界列表(有不受限制权限per_land_admin)
    - "world"
    - "newWorld"
    - "world_nether"
  addFlags:                #创建领地后自动添加的标记
    - "banBreak:0"
    - "banPlace:0"
    - "banIgnite:0"
    - "banDoor:0"
    - "banContact:0"
    - "banButton:0"
    - "banContainer:0"
    - "banUseOther:0"
    - "banBucket:0"
    - "banPvp:0"
    - "protect:0"
    - "banShop:0"
    - "banPotionHurt:0"
  baseCost: 300            #手续费
  perCost: 0.08            #每个格子花费
  vipPerCost: 0.05         #VIP的领地每格花费
  vipPer: "per.land.handler.create.vip"
  limit:                   #领地限制(有不受限制权限perNoLimit)
    size:                  #领地大小限制
      min: 1
      max: 10000000
    xzRange:               #x与z轴长度限制
      min: 1
      max: 500
    yRange:                #y轴长度限制
      min: 1
      max: 300
     
free:
  enable: true             #是否生效
  per: "per.land.handler.free"       #获取免费领地棒的权限
  check: "&5+免费领地棒+"  #免费领地棒的检测标记
  interval: 1000           #使用间隔
  worlds:                  #允许使用此棒的世界
    - "newWorld"
  radius: 10               #半径
  namePrefix: "免费领地_"  #免费领地的名字前缀,后加玩家名
  addFlags:                #创建免费领地后自动添加的标记
    - "banBreak:0"
    - "banPlace:0"
    - "banIgnite:0"
    - "banDoor:0"
    - "banContact:0"
    - "banButton:0"
    - "banContainer:0"
    - "banUseOther:0"
    - "banBucket:0"
    - "banPvp:0"
    - "protect:0"
    - "banShop:0"
    - "banPotionHurt:0"
     
enterLeave:
  interval: 700                      #检测间隔,单位毫秒(注意此选项修改后需要重启服务器才会生效)
      
flag:
  per: "per.land.handler.flag"       #设置标记的权限
  invaidFlags:                       #无效的标记列表
  removeName: "&4确认删除标记吗?"
  removeLore:

info:
  perInfoNow: "per.land.handler.infoNow"         #查看当前位置领地列表的权限
  perInfoLand: "per.land.handler.infoLand"       #查看指定领地信息的权限
  interval: 1000                                 #查看间隔,单位毫秒
  
pers:
  max: 50                                        #每个标记的最大权限数量
  per: "per.land.handler.pers"                   #设置领地标记权限的权限
  addAllName: "&a你确认添加所有玩家权限吗?"
  addAllLore:
    - "&7(会使所有玩家都拥有此标记权限)"
  delAllName: "&4你确认删除所有玩家权限吗?"
  delAllLore:
    - "&7(会将标记权限列表清空)"

remove:
  per: "per.land.handler.remove"     #删除领地的权限
  name: "&4确认删除吗?"
  lore:
    - "&7(删除后无法恢复)"
  
select:
  per: "per.land.handler.select"     #选择,查看范围的权限
  interval: 400                      #使用间隔,单位毫秒
  getInterval: 30000                 #获取选择棒的间隔,单位毫秒
  check: "&5+选择棒+"

sell:
  per: "per.land.handler.sell"       #出售地皮的权限(玩家)
  buyPer: "per.land.handler.sell.buy"#购买地皮的权限(玩家)
  name: "&4取消出售吗?"
  lore:
  tax: 5                             #购买地皮需要交纳的税率,0-100
    
set:
  setOwnerPer: "per.land.handler.set.owner"       #改变领地所有者的权限(玩家)
  setNamePer: "per.land.handler.set.name"         #改变领地名字的权限(玩家)
  setLevelPer: "per.land.handler.set.level"       #设置领地等级的权限(管理)
  setOverlapPer: "per.land.handler.set.overlap"   #设置领地是否允许重叠的权限(管理)
  setFriendPer: "per.land.handler.set.friendPer"  #设置领地是否允许更改好友权限的权限(玩家)
  setRangePer: "per.land.handler.set.range"       #更改领地范围的权限(玩家)
  toggleFriendPerInterval: 8000                   #更改好友权限间隔
  cost: 10                                        #改变范围的手续费
  
show:
  per: "per.land.handler.show"                    #显示范围边框的权限
  id: 89
  maxShowBlocks: 200                              #最大显示改变的方块数量
  interval: 10000                                 #两次显示的最小间隔,单位毫秒
  
subzone:
  per: "per.land.handler.subzone"                 #创建地皮权限
  baseCost: 100                                   #手续费
  addFlags:
    - "banBreak:0"
    - "banPlace:0"
    - "banIgnite:0"
    - "banDoor:0"
    - "banContact:0"
    - "banButton:0"
    - "banContainer:0"
    - "banUseOther:0"
    - "banBucket:0"
    - "banPvp:0"
    - "protect:0"
    - "banShop:0"
    - "banPotionHurt:0"
    
#变量:
#<player>:触发的玩家名字
#<id>:领地id
#<name>:领地名字
#<owner>:领地所有者
#<level>:领地等级
#<size>:领地大小
#<world>:领地所处世界
tip:
  per: "per.land.handler.tip"        #设置进出领地提示的权限(玩家)
  defaultEnterTip: "&6你进入了 &3<name>"
  defaultLeaveTip: "&7你离开了 &3<name>"
  maxLength: 200                     #提示最大长度
  
tp:                                  #指传送领地传送点
  perTp: "per.land.handler.tp"       #传送领地传送点的权限
  perSet: "per.land.handler.setTp"   #设置领地传送点的权限
  noDelayPer: "per.land.handler.tp.noDelay"   #传送无延迟的权限
  delay: 3                           #传送延迟,单位秒
  interval: 10000                    #传送间隔,单位毫秒
  
zone:                                #每个格子花费使用create的配置
  per: "per.land.handler.zone"                     #创建小区权限
  perNoLimit: "per.land.handler.zone.noLimit"      #不受大小限制权限
  buyWorld:                          #玩家可创建小区的世界列表(有不受世界限制权限)
    - "world"
    - "newWorld"
    - "world_nether"
  addFlags:                          #创建小区后自动添加的标记
    - "banBreak:0"
    - "banPlace:0"
    - "banIgnite:0"
    - "banDoor:0"
    - "banContact:0"
    - "banButton:0"
    - "banContainer:0"
    - "banUseOther:0"
    - "banBucket:0"
    - "banPvp:0"
    - "protect:0"
    - "banShop:0"
    - "banPotionHurt:0"
  baseCost: 10000                    #手续费
  limit:                             #小区限制(有不受限制权限)
    size:                            #小区大小限制
      min: 1
      max: 100000000
    xzRange:                         #x与z轴长度限制
      min: 1
      max: 1000
    yRange:                          #y轴长度限制
      min: 1
      max: 300
#######manager################################################################ 
land:
  initMax: 5                         #每个玩家初始最大领地数量
  
fix:
  per: "per.land.handler.fix"        #固定领地的权限
  name: "&4你确认固定领地吗?"
  lore:
    - "&7(固定领地后无法取消固定!)"
    - "&7(固定领地后领地无法再改变!)"
    - "&7(固定的领地可通知管理删除)"
    - "&7(请勿必谨慎选择!!!)"
    
item:
  confirmTimeLimit: 8                         #确认时间限制
  showMainMenuPer: "per.land.showMainMenu"    #显示领地主菜单的权限
  showSeeAllPer: "per.land.showSeeAll"        #显示全部领地,小区,地皮列表的权限
  showInterval: 800              #显示界面间隔,单位毫秒
  lineMaxLength: 100             #lore里一行最大显示长度
  item: 358                      #显示领地信息用的物品
  displayName: "&3领地(ID&6{0}&3):&6{1}"
  check:                         #检测用,与displayName相关
    from: "ID&6"
