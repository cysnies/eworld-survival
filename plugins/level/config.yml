#功能:
#>称号
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/level/language_cn.yml"
#################################
#####         优惠          #####
#################################
benefit:
  from: 297                      #单位天
  to: 999999                     #单位时
  levels:
    - 200
    - 201
    - 202
    - 203
    - 204
    - 205
#################################
#####         权限          #####
#################################
#管理权限
per_level_admin: "per.level.admin"
#查看其它玩家称号的权限
per_level_info_other: "per.level.info.other"
#################################
#####         配置          #####
#################################
check:
  interval: 300                  #期限的检测间隔,单位秒
pre:
  has: "&a\u2714"
  hasnot: "&c\u2718"
#################################
#####       称号类型        #####
#################################
#类型ID 类型名
#此处的位置决定称号的排序,非由ID大小决定
type:
  - "1 等级"
  - "5 个人"
  - "10 竞争"
  - "15 其它"
  - "20 赞助"
  - "25 职位"
#################################
#####     检测添加方式      #####
#################################
addType:
  - "0 自动"
  - "1 定时周期性检测"
  - "2 服务器重启时检测"
  - "3 管理手动添加"
#################################
#####         效果          #####
#################################
effect:
  names:
    attack: "攻击"
    health: "生命上限"
    miss: "闪避"
#################################
#####         显示          #####
#################################
show:
  interval: 5000                 操作间隔,单位毫秒
#################################
#####         称号          #####
#################################
level:
  level1:                        #'level'后的数字唯一即可
    id: 1                        #称号ID,唯一即可,并不代表排列顺序
    typeId: 1                    #称号对应的类型ID
    overlap: false               #此称号是否允许重叠
    name: "泥土"                 #称号名
    show: "&f[&7泥土&f]"         #称号的显示名
    condition: "在主界面花费1000金币升级"#获得条件的显示
    addType: 0                   #检测添加方式的ID
    timeLimit: -2                #期限,-1表示非永久,-2表示永久,大于0表示每次获取时会增加的期限
    group: "level_1"             #称号绑定的权限组,不可为空
    pers:                        #获得权限的显示列表,可为空
      - "&6侧边栏广告宣传"
      - "&6聊天栏广告宣传(/ad)"
      - "&6领地'banMove'标记权限"
      - "&6发邮件的权限"
    effects:                     #称号效果,可为空
      - "1 0 1.0"                #效果类型(0表示攻,1表示生命上限,2表示闪避) 操作(0表示加,1表示加百分比) 值(实数)
    rewards: "r1_1"              #奖励类型,可为空
    rewardsShow:                 #奖励的显示列表,可为空
      - "&6150经验"
  level2:
