#################################
items:
  main_info:
    type: PAPER
    meta:
      ==: ItemMeta
      meta-type: UNSPECIFIC
      display-name: '§3当前显示称号: §f{0}'
      lore:
        - '§3当前效果:'
        - §3+{0}§6攻
        - §3+{1}§6生命上限
        - §3+{2}%§6攻
        - §3+{3}%§6生命上限
        - §3+{4}%§6闪避
  main_has:
    type: GREEN_RECORD
    meta:
      ==: ItemMeta
      meta-type: UNSPECIFIC
      display-name: §a§l查看已获取的称号
  main_show:
    type: ENDER_PEARL
    meta:
      ==: ItemMeta
      meta-type: UNSPECIFIC
      display-name: §6§l选择显示称号
      lore:
        - '§7(会显示在玩家列表,聊天信息及玩家头上)'
