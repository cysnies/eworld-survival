#功能:
#>牌子玩家命令
#>牌子控制台命令
#>改变行颜色或内容
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/sign/language_cn.yml"
#################################
#####         权限          #####
#################################
#牌子管理权限
per_sign_admin: "per.sign.admin"
#################################
#####          配置         #####
#################################
#命令牌子标志
flag: "cmd"
#显示
show: "&5[命令]"
#命令牌子使用间隔,单位毫秒
cmdInterval: 1000
#点击牌子的距离要求(玩家头与牌子的距离)
distance: 0.7

cmd:
  createFlag: "cmd"
  checkFlag: "[玩家命令]"
  tip: "可以让玩家发出命令."
  playerCanUse:              #玩家可以使用的指令名列表
    - "cmd"
    - "spawn"
    - "house"
    - "home"
    - "town"
    - "back"
    - "go"
  
console:
  createFlag: "console"
  checkFlag: "[控制台命令]"
  tip: "可以让控制台发出命令."