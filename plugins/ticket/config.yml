        - "§6充值流程: §a进入充值平台充值后,在订单成功界面里找到§b§l8位卡密§a,使用即可"
        - "§6网址: §7点击一下此按钮,会出来网址,再点击网址即可进入."
        - "§7(充值界面里游戏名随意填,订单成功界面卡号都是a,不用理会)"
        - "§7(此方式可以用银行卡,支付宝支付或手机充值卡,骏卡,Q币卡等各种卡来支付)"
