      meta-type: UNSPECIFIC
      display-name: §4§l点券说明
      lore:
        - "§c一.点券是什么?"
        - "§6答:§a点券是本服务器里的一种虚拟货币,类似金币,有数量."
        - "§c二.点券有什么用?"
        - "§6答:§b点券只能在本页面使用,可以购买首充大礼包,无偿赞助,5种VIP"
        - "§c三.点券怎么获得?"
        - "§6答:§a1.充值获得;2.使用点券石获得"
        - "§c四.点券可以转账吗?"
        - "§6答:§b可以将点券制作成点券石然后出售."
        - "§c五.人民币与点券的兑换比例是多少?"
        - "§6答:§a10元=100点券."
        - "§c六.点券能购买其它东西吗?"
