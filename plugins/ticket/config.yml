        - "§6钻石鉴定石§3x8 §6钻石保护石§3x8 §6钻石打孔石§3x8"
        - "§6劣质钻石修复石§3x20 §6钻石修复石§3x10 §6完美钻石修复石§3x5"
        - "§57星§6钻石圣剑§3x1 §55星§6神弓§3x1 §6全套附魔钻石甲§3x1"
