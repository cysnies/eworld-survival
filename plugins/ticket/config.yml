#功能:
#>点券
#>兑换码兑换点券
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/ticket/language_cn.yml"
#################################
#####         权限          #####
#################################
#ticket管理权限(/ticket <reload/add/del>)
per_ticket_admin: "per.ticket.admin"
#################################
#####       兑换码配置      #####
#################################
#修正增加年
fixYear: 1

#两次操作(使用与查看)的间隔,单位毫秒(有插件管理权限的无限制)
interval: 5000

#兑换码允许的字符
chars: "abcdefghjkmnopqrstuvwxyz234567890"

#兑换码长度
length:                          #兑换码长度
  generate:                      #随机生成
    fix: 8                       #生成的长度
  create:                        #非随机生成,手动创建
    min: 1                       #最小长度
    max: 10                      #最大长度
    
#次数(/ticket code generate <价值> <次数>中的次数)
times:
  max: 100                       #上限,防止意外输入
#################################
#####          配置         #####
#################################
#累加需要的玩家数
goldAdd: 50
#金币的刷新天数检测间隔,单位秒
goldInterval: 60
#金币更新间隔,单位毫秒
goldUpdate: 3600000
#每次更新限售的金币数
goldAmount: 15000
#1点券可以购买多少金币
goldRate: 280
#称号ID(vip1-vip5,无偿赞助)
levelId:
  - "1 200"
  - "2 201"
  - "3 202"
  - "4 203"
  - "5 204;205"
  - "6 206"
#执行的命令
levelCmd: "level add <p> <level>"
item:
  rate: 300                      #制作点券石的固定手续费,单位金币
  price: 100                     #1-5钻的价格,单位点券
  priceYear: 1000                #1-5钻年费的价格,单位点券
  free: 100                      #赞助石的价格,单位点券
  interval: 500                  #查看间隔
  confirmTimeLimit: 8            #确认时间限制
  main:
    buyGold: 16
    stone: 17
    buyTip: 0
    vipTip: 1
    buy1: 9
    buy2: 10
    info: 4
    codeInfo: 12
    codeUse: 14
    vip1: 27
    vip2: 29
    vip3: 31
    vip4: 33
    vip5: 35
    free: 8
    big: 7
    vip11: 36
    vip12: 38
    vip13: 40
    vip14: 42
    vip15: 44
big:
  gold: 18000
  level: 30
  cost: 100
  con:
    - 155
    - 4
    - 50
    - 53
    - 58
  itemSmelt:
    - "luck_diamond_3 8"
    - "luck_diamond_4 8"
    - "luck_diamond_5 8"
    - "luck_diamond_2 20"
    - "luck_diamond_1 10"
    - "luck_diamond_7 5"
    - "spec 1"
  item:
    - "big_sword 1"
    - "big_bow 1"
    - "big_armor_1 1"
    - "big_armor_2 1"
    - "big_armor_3 1"
    - "big_armor_4 1"
#################################
#####          物品         #####
#################################
items:
  ticketStone:
    type: DIAMOND
    meta:
      ==: ItemMeta
      meta-type: UNSPECIFIC
      display-name: §5点券石
      lore:
      - §5+命令石+§a控制台
      - §5命令:§b ticket add <p> <amount>
      - §7(使用后可以获得§5<amount>§7点券)
      - §7(右键任意方块使用)
  main_stone:
