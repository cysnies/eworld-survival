  - "&2  指定账号是否已绑定QQ号?"
  - "&2    >>>是:绑定的QQ号与联系服主用的QQ号是否是同一个?"
  - "&2      >>是:进入&6阶段3"
  - "&2      >>否:联系服主用的QQ号的Q龄是至少1年的?"
  - "&2        >是:进入&6阶段2"
  - "&2        >否:无效"
  - "&2    >>>否:联系服主用的QQ号的Q龄是至少1年的?"
  - "&2      >>是:进入&6阶段2"
  - "&2      >>否:无效"
  - "&a阶段2:&e检测阶段"
  - "&2先封禁30天,如果30天内未有其它人来领取账号,进入&6阶段3"
  - "&a阶段3:&e处理阶段"
  - "&2允许修改绑定QQ或账号密码."
