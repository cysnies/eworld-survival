  - "&a=====    &6类型&a    ====="
  - "&2命令牌子分为&3服务器命令&2与&3玩家命令&7(没看懂不影响)"
  - ""
  - "&a=====    &6使用&a    ====="
  - "&2右键命令牌子即可使用."
  - ""
  - "&a=====    &6创建&a    ====="
  - "&2将牌子贴墙上(1),第一行写&ecmd cmd"
  - "&2第二行写上命令,如&e/spawn&2(返回重生点),又如&e/go xxx&2(传送领地)"
  - "&2第三行与第四行随便写."
  - ""
  - "&a=====    &6命令列表&a    ====="
  - "&2对玩家来说,创建牌子时可使用的命令是有限的,包括:"
  - "&e/cmd,/spawn,/house,/home,/back,/town,/go xxx"
  - ""
  - "&6&l&o&n>>返回主界面(b)&6"
  
to:
  - "b 主界面"
  
tip:
  - "1 &e不要放置在地上,否则点击使用时会提示距离太远."