msg:
  - "&a===== &6建立牌子锁&a ====="
  - "&b方法一: &2手拿&3牌子&2,直接右键点击对应的方块,即可上锁."
  - "&6适合:&e箱子,熔炉,附魔台,刷怪笼,钻石块,唱片机,铁砧,信标,发射器,投掷器"
  - "&b方法二: &2在与方块相邻的位置放置牌子,第一行写&3[private]"
  - "&6适合:&e木门,铁门,栅栏门,活板门"
  - ""
  - "&a=====  &6添加权限&a  ====="
  - "&2先右键选中要操作的牌子锁(1),然后输入&3/lock 行号 玩家名&2来添加权限(2)"
  - "&2如果要添加的权限较多,可以在容器或门上再贴个牌子."
  - ""
  - "&a=====  &6其它提示&a  ====="
  - "&2牌子锁可保护你的容器安全,牌子锁命令&3/lockette&2(或简写&3/lock&2)"
  - "&c同一个容器或门可贴多个锁,但请注意牌子上的&6[所有人]&c权限务必去除!!!"
  - ""
  - "&6&l&o&n>>返回主界面(b)&6"
  
to:
  - "b 主界面"
  
tip:
  - "1 &e可以空手或拿物品点击,但不能拿方块点击."
  - "2 &e行号只能是1,2,3,4中的一个."