msg:
  - "&a=====    &6煅烧方式&a    ====="
  - "&2游戏默认的熔炉烧矿即&c煅烧&2,对&b铁矿,金矿,钻石矿&2有效."
  - ""
  - "&a=====    &6煅烧出产&a    ====="
  - "&b铁矿&2可能煅烧出&e铁锭&2或&6[幸运石]铁&2.(1)"
  - "&b金矿&2可能煅烧出&e金锭&2或&6[幸运石]金&2."
  - "&b钻石矿&2可能煅烧出&e钻石&2或&6[幸运石]钻石&2."
  - ""
  - "&a=====    &6煅烧规则&a    ====="
  - "&2煅烧随机出现幸运石,但如果煅烧出矿物不取走:"
  - "&7 - 如果煅烧出普通的矿物不取走,则下一个煅烧出的必然是普通矿物!"
  - "&7 - 如果煅烧出幸运石不取走,则煅烧无法继续进行!"
  - "&c因此,最高效的煅烧方法是烧出一个取走一个!"
  - ""
  - "&6&l&o&n>>返回煅烧帮助(b)&6"
  
to:
  - "b 煅烧帮助"
  
tip:
  - "1 &e使用&6幸运石&e可获得各种特殊石头."