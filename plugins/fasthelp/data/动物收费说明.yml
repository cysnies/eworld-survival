msg:
  - "&a=====    &6收费价格&a    ====="
  - "&2收费时间是随机的,平均每小时每只加载的动物会收费&e1&2金币."
  - "&7(只有加载的动物才收费,而只有旁边有玩家动物才会被加载)"
  - ""
  - "&a=====    &6哪些动物收费&a    ====="
  - "&2猪,鸡,牛,羊,马,蘑菇牛,狼,豹猫."
  - ""
  - "&a=====    &6收费判定&a    ====="
  - "&2动物所在位置的最高级领地所有者就会被判定为动物的养殖者."
  - "&2比如生存世界内有小区,小区内有地皮,地皮内有动物,"
  - "&2则地皮的所有者会被判定为养殖者进行收费."
  - "&a特殊情况:村庄世界里养殖的动物会随机对村员进行收费."
  - ""
  - "&a=====    &6提示&a    ====="
  - "&2生存子服里养殖&e&l免费!"
  - "&6&l&o&n>>返回主界面(b)&6"
  
