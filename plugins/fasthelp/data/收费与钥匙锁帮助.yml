msg:
  - "&a===== &6建立&c收费锁&a ====="
  - "&2在&c铁门&2上方的方块上贴牌子,第一行写&3lock&2,第二行写&3价格&2即可."
  - "&e点券收费锁:&2同收费锁,把&3lock&2换成&3lockt&2即可."
  - ""
  - "&a===== &6建立&b钥匙锁&a ====="
  - "&2同建立收费锁方法,但第三行必须写&3key:钥匙名&2(1)."
  - ""
  - "&a===== &6高级功能&7(看不懂可以无视之)&a ====="
  - "&3收费锁&2牌子第三行可写&3进:出&2(2)来控制是否允许玩家进出."
  - "&3收费锁&2与&3钥匙锁&2牌子第四行可写&3空:钱:效&2(3)来限制空背包,无金币,无药效."
  - ""
  - "&a=====  &6其它提示&a  ====="
  - "&2钥匙命令&3/key&7(需要&3[青金石]&7称号才能创建钥匙)(&c红钻VIP&7创建钥匙花费更少)"
  - "&2玩家通过收费锁会自动付费给你,其中10%会交税给系统(&c红钻VIP&2免税)"
  - "&2建立点券收费锁需要&e[原木]&2称号."
  - "&6&l&o&n>>返回主界面(b)&6"
  
to:
  - "b 主界面"
  
tip:
  - "1 &e如&3key:刷怪屋&e,建立后玩家必须拿着对应名字的钥匙才能进."
  - "2 &a进&e与&a出&e变量可选值为&3on&e或&3off&e,如&3on:off&e表示可以进不能出."
  - "3 &a空,钱,效&e可选变量值为&3on&e或&3off&e,如&3on:off:on&e表示通过锁需要背包为空且无药效."