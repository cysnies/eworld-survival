tip:
  - "1 &e给其它玩家添加地皮权限,你仍有地皮的控制权,但其它玩家可能感觉不安全."
  - "2 &e将地皮出售给其它玩家,你将有丧失地皮的控制权,但其它玩家可能感觉安全."