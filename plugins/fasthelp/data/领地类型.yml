  - "&a=====    &6领地&a    ====="
  - "&2一般意义上的领地,没有子领地的概念."
  - "&2玩家能建立的是无法重叠的领地,不能与其它玩家领地冲突."
  - ""
  - "&a=====    &6小区&a    ====="
  - "&2小区请尽量建得大点,其内可建立若干地皮,然后可以将地皮进行出售."
  - "&2小区请尽量建立在领地少的地方,否则可能与其它领地冲突而扩展不了."
  - "&c建立小区需慎重!不仅花费高,而且如果其内有地皮是无法删除的!"
  - ""
  - "&a=====    &6地皮&a    ====="
  - "&2只能建立在小区内&7(创建地皮只需花手续费&5100&7金币)"
  - "&2建立地皮后可以给其它玩家添加地皮权限(1)或将地皮出售给玩家(2)"
  - ""
  - "&6&l&o&n>>返回领地帮助(b)&6"
  
to:
