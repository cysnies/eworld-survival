msg:
  - "&a=====    &6使用方式&a    ====="
  - "&2具体可自行查看石头上的说明,一般是右键任意方块使用."
  - ""
  - "&a=====  &6特殊石头类型&a  ====="
  - "&b&o>修复石&7(包括3种品质的修复石):"
  - "&7 - 劣质修复石,修复效果较差,&c会&7降低装备脆弱度,可合成为普通修复石"
  - "&7 - &3普通修复石&7,修复效果普通,&c会&7降低装备脆弱度,可合成为完美修复石"
  - "&7 - &6完美修复石&7,修复效果较好,&a不会&7降低装备脆弱度!"
  - "&b&o>封印石:&2可以封印动物成动物蛋&7(不保留等级)"
  - "&b&o>鉴定石:&2鉴定&3武器&2或&3装备&c(工具无法鉴定)&2,鉴定后会有&6星级&2,可镶嵌&b宝石&2."
  - "&b&o>打孔石:&2可以给有星级的&3武器&2或&3装备&2打孔,成功升星,失败降星&c(慎用!)"
  - "&b&o>保护石:&2在镶嵌宝石失败时,可以保护宝石等级不掉落,放&a第二格&2使用."
  - "&b&o>特效石:&2可以给&3弓&2或&3钻石剑&2加上各种炫酷的&6特效!&c(无法通过幸运石获得)"
  - "&b&o>闪电石:&2可以融入武器,不占用镶嵌孔,武器触发闪电后会增加&e多倍&2伤害!"
  - "&b&o>绑定石:&2可以为任何物品增加绑定属性,绑定后物品&e无法扔出&2."
  - "&6&l&o&n>>返回煅烧帮助(b)&6"
  
