#功能:
#>快速帮助
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/fasthelp/language_cn.yml"
#################################
#####         权限          #####
#################################
#管理权限(管理)
per_fasthelp_admin: "per.fasthelp.admin"
#获取快速帮助指南针的权限
per_fasthelp_get: "per.fasthelp.get"
#################################
#####         配置          #####
#################################
speed: 300                       #操作间隔,单位毫秒
flag: "q"                        #进入主界面输入的内容
mainPage: "主界面"
empty: 0                         #显示前发送空行的数量,>=0
check: "&5+快速帮助+"            #检测标记
item:                            #快速帮助指南针
  type: COMPASS
  meta:
    ==: ItemMeta
    meta-type: UNSPECIFIC
    display-name: "§3快速帮助"
    lore:
      - "§5+快速帮助+"
      - "§7(右键点击任意方块进入)"