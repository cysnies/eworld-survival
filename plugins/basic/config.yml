#功能:
#>MOTD
#>自动保存
#>世界读取
#>进出服务器提示
#>AFK
#################################
#####       语言文件        #####
#################################
#可以使用相对路径(是相对于服务端所在文件夹的路径)
language: "plugins/basic/language_cn.yml"
#################################
#####         权限          #####
#################################
#管理权限
per_basic_admin: "per.basic.admin"
#开启/关闭玩家进出服务器提示的权限
per_basic_serverMsg: "per.basic.serverMsg"
#################################
#####          MOTD         #####
#################################
#设置为空表示不改变
motd: "&3&lE世界&6&l(怀旧生存服) &a&lQQ群:&b&l816097458"
#################################
#####        自动保存       #####
#################################
#自动保存所有世界的间隔,单位秒,设置为0表示禁用此功能
saveInterval: 200
#################################
#####       世界读取        #####
#################################
#将被读取(不存在则创建)的世界列表
worlds:
  - "world"
  - "newWorld"
  - "houseWorld"
  - "oreWorld"
  - "world_nether"
  - "world_the_end"
  - "townWorld"
#################################
#####   玩家进出服务器提示   ####
#################################
#模式2显示时间
dur: 5
#是否使用玩家显示名,false将直接使用玩家名字
displayName: true
#################################
#####          AFK          #####
#################################
#是否开启自动AFK
afk: true
#与椅子(sit)插件挂钩后当玩家坐在椅子上时是否不设置AFK
checkSit: true
#单位秒,当玩家位置无改变达到这个时间后自动踢出
afkTime: 600
#单位秒,afk检测间隔
afkCheckInterval: 10