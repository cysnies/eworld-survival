#功能:
#>新年红包

#是否开启新年红包功能
enable: false

format: "新年快乐~我要红包{0}"

#价格
price: 10
priceShow: "&c许愿花费{0}金币~"

tip:
  #是否开启
  enable: true
  #延迟显示,单位tick
  delay: 10
  show: "&b[新年红包]&e提示:输入'{0}'来许愿获取红包吧~&7(手续费{1}金币哦~)\n
         &7&o- xxx表示想要得到的红包奖金,越少就越容易实现哦~"
  
#玩家要红包数量限制
amount:
  min: 20
  minShow: "&b[新年红包]&c你要的红包太少了,至少得{0}哦~"
  max: 1000
  maxShow: "&b[新年红包]&c你要的红包太多了,最多{0}哦~"

#基数,成功几率=base/玩家要的数量
base: 6
  
#幸运红包
luck:
  #奖池奖金达到这个数时发
  condition: 2000
  #发的数量
  amount:
    min: 500
    max: 1500
  show: "&b[新年红包]&5喜欢玩家&e{0}&5获得幸运红包&6{1}&5金币~~~~"
  
#成功
success:
  show: "&b[新年红包]&a恭喜玩家&e{0}&a获得新年红包&6{1}&a金币~~~"
#失败
fail:
  less: "&b[新年红包]&c你的金币太少了~不足许愿花费{0}金币哦~"
  back:
    min: 1
    max: 3
    show: "&b[新年红包]&c玩家&e{0}&c获得安慰红包&6{1}&c金币~"