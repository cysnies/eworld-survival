  #     - survival-mysql-data:/var/lib/mysql
  #     - ./sql/schema/init_mc001.sql:/docker-entrypoint-initdb.d/01-mc001-schema.sql:ro
  #   healthcheck:
  #     test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
  #     interval: 5s
